<title>SEA · Lager</title>
<style>
:root{
  --ink:#17161a; --papier:#f4f4f2; --karte:#fff; --linie:#e3e0dc; --kopfbg:#17161a;
  --rot:#a8271c; --rot-hell:#c8503f; --grau:#77747c;
  --gruen:#2f7d43; --gelb:#b9861a;
  --xs:#8b5cf6; --s:#22c55e; --m:#3b82f6; --l:#eab308; --xl:#ef4444; --xxl:#94a3b8;
  --schatten:0 8px 24px rgba(28,18,14,.12),0 2px 5px rgba(28,18,14,.07);
}
@media (prefers-color-scheme: dark){
  :root{--ink:#f2f0ee;--papier:#121114;--karte:#1c1a1f;--linie:#2e2b32;--kopfbg:#000;
        --rot:#e0574a;--rot-hell:#f07a6d;--grau:#9a969f;--gruen:#4ade80;--gelb:#e3b34a;
        --schatten:0 8px 24px rgba(0,0,0,.5),0 2px 5px rgba(0,0,0,.3)}
}
:root[data-theme="dark"]{--ink:#f2f0ee;--papier:#121114;--karte:#1c1a1f;--linie:#2e2b32;--kopfbg:#000;
  --rot:#e0574a;--rot-hell:#f07a6d;--grau:#9a969f;--gruen:#4ade80;--gelb:#e3b34a;
  --schatten:0 8px 24px rgba(0,0,0,.5),0 2px 5px rgba(0,0,0,.3)}
:root[data-theme="light"]{--ink:#17161a;--papier:#f4f4f2;--karte:#fff;--linie:#e3e0dc;--kopfbg:#17161a;
  --rot:#a8271c;--rot-hell:#c8503f;--grau:#77747c;--gruen:#2f7d43;--gelb:#b9861a;
  --schatten:0 8px 24px rgba(28,18,14,.12),0 2px 5px rgba(28,18,14,.07)}

*{box-sizing:border-box}
body{margin:0;background:var(--papier);color:var(--ink);
  font:16px/1.45 -apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  -webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
button{font:inherit;color:inherit;border:none;background:none;cursor:pointer}
button:focus-visible,input:focus-visible,select:focus-visible{outline:3px solid var(--rot);outline-offset:2px}
input,select{font:inherit;color:inherit}

.app{display:flex;flex-direction:column;height:100dvh;max-width:560px;margin:0 auto;overflow:hidden}
.kopf{display:flex;align-items:center;gap:10px;padding:11px 15px;background:var(--kopfbg);
  color:#f2f0ee;flex:none}
.wm{font-family:Georgia,serif;font-size:19px;font-weight:700;letter-spacing:.1em}
.wm i{color:var(--rot-hell);font-style:normal}
.ort{font-size:11px;color:#9a969f;padding-left:10px;border-left:1px solid #3a373f;white-space:nowrap}
.kopf .sp{flex:1}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid currentColor;white-space:nowrap}
.pill.ok{color:#6ee7a0}.pill.warn{color:#f0b355}

main{flex:1;min-height:0;display:flex;flex-direction:column}
.view{display:none;flex-direction:column;flex:1;min-height:0;padding:14px 15px 12px;gap:12px}
.view.on{display:flex}
.roll{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;
  flex-direction:column;gap:11px}
.fuss{flex:none;display:flex;flex-direction:column;gap:9px;padding-top:4px}
h1{font-family:Georgia,serif;font-size:21px;margin:0}
.kopfzeile{display:flex;align-items:baseline;gap:10px;flex:none}
.kopfzeile .zahl{margin-left:auto;font-size:16px;font-weight:800;color:var(--grau);
  font-variant-numeric:tabular-nums}

.karte{background:var(--karte);border:1px solid var(--linie);border-radius:13px;padding:14px;
  box-shadow:var(--schatten);display:flex;flex-direction:column;gap:10px}
.lab{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--grau);font-weight:800}

.b{background:var(--rot);color:#fff;border-radius:12px;padding:15px;font-size:17px;font-weight:700;
  min-height:56px;display:flex;align-items:center;justify-content:center;gap:9px;width:100%;
  transition:transform .1s}
.b:active{transform:scale(.98)}
.b:disabled{opacity:.4}
.b.geist{background:transparent;color:var(--ink);border:1.5px solid var(--linie)}
.b.dunkel{background:var(--ink);color:var(--papier)}
.b.gruen{background:var(--gruen)}
.b.klein{min-height:46px;font-size:15px;padding:10px 15px;width:auto}
.b.riesig{min-height:78px;font-size:21px}
.reihe{display:flex;gap:9px}
.reihe .b{flex:1}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

.feldz{display:flex;flex-direction:column;gap:5px}
input[type=text],input[type=tel],input[type=number],select{background:var(--papier);
  border:1.5px solid var(--linie);border-radius:11px;padding:13px;font-size:17px;width:100%}
input[type=number]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

.buehne{position:fixed;inset:0;z-index:70;background:#000;display:none;align-items:center;
  justify-content:center;overflow:hidden}
.buehne.an{display:flex}
.buehne video{width:100%;height:100%;object-fit:cover}
.rahmen{position:absolute;left:8%;right:8%;top:34%;height:26%;border:2px solid rgba(255,255,255,.9);
  border-radius:12px;box-shadow:0 0 0 100vmax rgba(0,0,0,.55)}
.rahmen::after{content:"";position:absolute;left:0;right:0;height:2px;background:var(--rot-hell);
  top:50%;box-shadow:0 0 14px var(--rot-hell);animation:sweep 2.4s ease-in-out infinite}
@keyframes sweep{0%,100%{transform:translateY(-52px);opacity:.4}50%{transform:translateY(52px);opacity:1}}
.buehne-stopp{position:absolute;bottom:calc(34px + env(safe-area-inset-bottom));left:50%;
  transform:translateX(-50%);background:rgba(255,255,255,.18);color:#fff;border:1.5px solid rgba(255,255,255,.5);
  border-radius:30px;padding:14px 34px;font-size:16px;font-weight:700}

.titelz{font-family:Georgia,serif;font-size:20px;line-height:1.25}
.fachgross{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-size:44px;font-weight:800;
  line-height:1;font-variant-numeric:tabular-nums}
.gr-zeile{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--linie)}
.gr-zeile:last-child{border-bottom:none}
.gr-punkt{width:15px;height:15px;border-radius:4px;flex:none}
.gr-name{font-size:17px;font-weight:800;width:44px;flex:none}
.gr-mengen{margin-left:auto;display:flex;gap:14px;align-items:flex-end}
.gr-ort{display:flex;flex-direction:column;align-items:flex-end;min-width:64px}
.gr-ort .k{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--grau);font-weight:800}
.gr-ort .v{font-size:27px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.gr-zeile.hol{background:rgba(185,134,26,.17);border-radius:9px;padding:9px 8px;border-bottom:none;
  box-shadow:inset 3px 0 0 var(--gelb)}
.gr-zeile.hol .v{color:var(--gelb)}
.gr-zeile.leer .v{color:var(--grau);opacity:.45}
.warnpunkt{width:23px;height:23px;border-radius:50%;background:var(--gelb);color:#17161a;
  font-size:15px;font-weight:900;display:flex;align-items:center;justify-content:center;flex:none}

.karte-box{background:var(--papier);border:1.5px solid var(--linie);border-radius:11px;padding:7px}
.puls{animation:pulsieren 1.5s ease-in-out infinite}
@keyframes pulsieren{0%,100%{opacity:.3}50%{opacity:1}}

.zaehl{display:flex;align-items:center;gap:10px}
.zaehl button{width:54px;height:54px;border-radius:13px;background:var(--papier);
  border:1.5px solid var(--linie);font-size:27px;font-weight:700;display:flex;
  align-items:center;justify-content:center;flex:none}
.zaehl input{flex:1;text-align:center;font-size:31px;font-weight:800;padding:9px}

.zeile{display:flex;align-items:center;gap:10px;padding:12px 2px;border-bottom:1px solid var(--linie)}
.zeile:last-child{border-bottom:none}
.zeile .haupt{flex:1;min-width:0}
.zeile .name{font-size:15px;line-height:1.3;overflow-wrap:anywhere}
.zeile .sub{font-size:12px;color:var(--grau);margin-top:2px}
.code{font-family:ui-monospace,Menlo,monospace;font-size:14px;font-weight:800;padding:5px 9px;
  border-radius:7px;background:rgba(168,39,28,.13);color:var(--rot);white-space:nowrap}
.code.leer{background:transparent;border:1px dashed var(--linie);color:var(--grau);font-weight:400}
.iknopf{width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  flex:none;color:var(--grau)}
.iknopf svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.9;
  stroke-linecap:round;stroke-linejoin:round}

.pos{display:flex;align-items:center;gap:10px;padding:12px 10px;border-radius:11px;
  border:1.5px solid var(--linie);background:var(--karte)}
.pos.fertig{opacity:.42}
.pos.fertig .pname{text-decoration:line-through}
.pos.embrach{border-color:var(--gelb);background:rgba(185,134,26,.14)}
.pos .haken{width:32px;height:32px;border-radius:9px;border:2px solid var(--linie);flex:none;
  display:flex;align-items:center;justify-content:center}
.pos.fertig .haken{background:var(--gruen);border-color:var(--gruen);color:#fff}
.pos .pname{font-size:15px;font-weight:600;line-height:1.25}
.pos .pmeta{font-size:12px;color:var(--grau);margin-top:3px;display:flex;gap:8px;
  flex-wrap:wrap;align-items:center}
.pgr{font-size:20px;font-weight:800;width:44px;text-align:center;flex:none}
.pmenge{font-size:23px;font-weight:800;flex:none;min-width:34px;text-align:right;
  font-variant-numeric:tabular-nums}
.balken{height:8px;background:var(--linie);border-radius:6px;overflow:hidden;flex:none}
.balken i{display:block;height:100%;background:var(--gruen);transition:width .25s}

.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{padding:12px 16px;border-radius:11px;border:1.5px solid var(--linie);background:var(--karte);
  font-size:17px;font-weight:800;min-width:58px;text-align:center}
.chip.an{background:var(--ink);color:var(--papier);border-color:var(--ink)}
.chip.rich{flex:1;font-size:15px}

.dlg{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.6);display:none;
  align-items:flex-end;justify-content:center;padding:16px}
.dlg.an{display:flex}
.dlg-box{background:var(--karte);border-radius:16px;padding:20px;width:100%;max-width:420px;
  display:flex;flex-direction:column;gap:14px}
.dlg-titel{font-size:18px;font-weight:700}

nav{flex:none;display:flex;background:var(--karte);border-top:1px solid var(--linie);
  padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;padding:9px 2px 11px;display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:10.5px;color:var(--grau);position:relative}
nav button.on{color:var(--rot);font-weight:800}
nav button.on::before{content:"";position:absolute;top:0;left:20%;right:20%;height:3px;
  background:var(--rot);border-radius:0 0 3px 3px}
nav svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.9;
  stroke-linecap:round;stroke-linejoin:round}

.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--kopfbg);
  color:#f2f0ee;padding:13px 20px;border-radius:11px;font-size:15px;font-weight:700;
  box-shadow:var(--schatten);z-index:90;opacity:0;pointer-events:none;transition:opacity .2s;max-width:88%}
.toast.an{opacity:1}
.leerstelle{text-align:center;color:var(--grau);font-size:14px;padding:30px 12px}
</style>

        </div>
      </div>
    </section>
  </main>

  <nav>

    <button data-v="eingang">

    <button data-v="auftrag">

      Katalog

  </nav>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <div class="buehne" id="buehne">

    <div class="rahmen"></div>
    <button class="buehne-stopp" id="b-stopp">Abbrechen</button>
  </div>

  <div class="dlg" id="dlg">
    <div class="dlg-box">
      <div class="dlg-titel" id="dlg-titel"></div>

      </div>
    </div>
  </div>
</div>

/* CSV */
function csvZerlegen(text){
  var zeilen = [], feld = "", zeile = [], anf = false;
  for(var i = 0; i < text.length; i++){
    var z = text[i];
    if(anf){
      if(z === '"'){ if(text[i+1] === '"'){ feld += '"'; i++; } else { anf = false; } }
      else { feld += z; }
    } else {
      if(z === '"'){ anf = true; }
      else if(z === ","){ zeile.push(feld); feld = ""; }
      else if(z === "\n"){ zeile.push(feld); zeilen.push(zeile); zeile = []; feld = ""; }
      else if(z !== "\r"){ feld += z; }
    }
  }
  if(feld.length || zeile.length){ zeile.push(feld); zeilen.push(zeile); }
  return zeilen;
}

function katalogAusCsv(text){
  var zeilen = csvZerlegen(text);
  if(!zeilen.length) return {varianten:[], fehler:"Datei leer"};
  var kopf = zeilen[0].map(function(h){ return h.trim(); });
  function idx(n){
    for(var i = 0; i < kopf.length; i++){ if(kopf[i].toLowerCase() === n.toLowerCase()) return i; }
    return -1;
  }
  var iT = idx("Title"), iH = idx("Handle"), iB = idx("Variant Barcode"),
      iS = idx("Variant SKU"), iP = idx("Variant Price");
  var oN = [idx("Option1 Name"), idx("Option2 Name"), idx("Option3 Name")];
  var oW = [idx("Option1 Value"), idx("Option2 Value"), idx("Option3 Value")];
  if(iT < 0) return {varianten:[], fehler:"Spalte Title fehlt"};

  var v = [], lt = "", lh = "";
  for(var r = 1; r < zeilen.length; r++){
    var z = zeilen[r];
    if(!z || z.length < 2) continue;
    var titel = (z[iT] || "").trim() || lt;
    if(titel) lt = titel;
    var handle = (iH >= 0 ? (z[iH] || "").trim() : "") || lh;
    if(handle) lh = handle;
    if(!titel) continue;
    var ean = iB >= 0 ? (z[iB] || "").trim() : "";
    var g = "", farbe = "";
    for(var o = 0; o < 3; o++){
      if(oN[o] < 0 || oW[o] < 0) continue;
      var n = (z[oN[o]] || "").trim().toLowerCase(), w = (z[oW[o]] || "").trim();
      if(!w) continue;
      if(/gr(ö|oe)sse|size/.test(n)) g = w;
      else if(/farbe|colou?r/.test(n)) farbe = w;
      else if(!g && /^(xxs|xs|s|m|l|xl|xxl|\d{2})$/i.test(w)) g = w;
    }
    var gn = normGroesse(g);
    v.push({ean:ean, titel:titel, groesse:gn, farbe:farbe,
            sku:iS >= 0 ? (z[iS] || "").trim() : "",
            preis:iP >= 0 ? (z[iP] || "").trim() : "",
            handle:handle, vid:(handle || normal(titel)) + "|" + gn + "|" + farbe});
  }
  if(!v.length) return {varianten:[], fehler:"Keine Artikel"};
  return {varianten:v, fehler:null};
}

function findeVariante(code){
  var v = KATALOG.filter(function(x){ return x.ean && x.ean === code; })[0];
  if(v) return v;

  return KATALOG.filter(function(x){ return x.vid === vid; })[0] || null;
}
function lerneEan(code, vid){ EANS[code] = vid; sichere(LS.eans, EANS); zeichneKopf(); }

function exportEans(){
  var z = ["Handle,Title,Option1 Value,Variant SKU,Variant Barcode"];
  Object.keys(EANS).forEach(function(code){
    var v = KATALOG.filter(function(x){ return x.vid === EANS[code]; })[0];
    if(!v) return;
    function q(s){ return '"' + String(s == null ? "" : s).replace(/"/g, '""') + '"'; }
    z.push([q(v.handle), q(v.titel), q(v.groesse), q(v.sku), q(code)].join(","));
  });
  if(z.length < 2){ zeigeToast("Nichts angelernt"); return; }
  var blob = new Blob([z.join("\n")], {type:"text/csv;charset=utf-8"});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "sea-eans.csv";
  document.body.appendChild(a); a.click();
  setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); }, 800);
  zeigeToast((z.length - 1) + " exportiert");
}

/* Wareneingang */
var eingang = null;
function eingangGesamt(d){ var s = 0; for(var g in d.mengen){ s += d.mengen[g] || 0; } return s; }

function zeichneEingang(){
  var i = $("#e-inhalt"), f = $("#e-fuss");
  if(!eingang){
    $("#e-zahl").textContent = "";
    i.innerHTML = "";
    f.innerHTML = '<button class="b riesig" id="be-scan">Scannen</button>';
    $("#be-scan").addEventListener("click", function(){ kameraStarten("eingang"); });
    return;
  }
  var d = eingang;
  $("#e-zahl").textContent = eingangGesamt(d);

  if(d.schritt === 1){
    i.innerHTML = '<div class="karte"><div class="titelz">' + esc(d.titel) + '</div>' +
      (d.fach ? '<div class="fachgross" style="font-size:30px">' + esc(d.fach) + '</div>' : "") + '</div>' +
      '<div class="karte">' + GR_REIHE.map(function(g){
        return '<div class="gr-zeile"><span class="gr-punkt" style="background:' + G_FARBE[g] + '"></span>' +
          '<span class="gr-name">' + g + '</span>' +
          '<span class="zaehl" style="margin-left:auto"><button data-m="' + g + '">−</button>' +
          '<input type="number" inputmode="numeric" data-e="' + g + '" value="' + (d.mengen[g] || 0) +
          '" style="width:80px"><button data-p="' + g + '">+</button></span></div>';
      }).join("") + '</div>';
    f.innerHTML = '<div class="reihe"><button class="b geist klein" id="be-ab">Abbrechen</button>' +
      '<button class="b" id="be-weiter"' + (eingangGesamt(d) ? "" : " disabled") + '>Weiter</button></div>';

    i.querySelectorAll("[data-p]").forEach(function(b){
      b.addEventListener("click", function(){
        var g = b.getAttribute("data-p");
        d.mengen[g] = (d.mengen[g] || 0) + 1;
        zeichneEingang();
      });
    });
    i.querySelectorAll("[data-m]").forEach(function(b){
      b.addEventListener("click", function(){
        var g = b.getAttribute("data-m");
        d.mengen[g] = Math.max(0, (d.mengen[g] || 0) - 1);
        zeichneEingang();
      });
    });
    i.querySelectorAll("[data-e]").forEach(function(x){
      x.addEventListener("change", function(){
        d.mengen[x.getAttribute("data-e")] = Math.max(0, parseInt(x.value, 10) || 0);
        zeichneEingang();
      });
    });
    $("#be-ab").addEventListener("click", function(){ eingang = null; zeichneEingang(); });
    $("#be-weiter").addEventListener("click", function(){
      GR_REIHE.forEach(function(g){ if(d.mengen[g] && d.zh[g] == null) d.zh[g] = d.mengen[g]; });
      d.schritt = 2;
      zeichneEingang();
    });
    return;
  }

  i.innerHTML = '<div class="karte"><div class="titelz">' + esc(d.titel) + '</div></div>' +
    '<div class="karte">' + GR_REIHE.filter(function(g){ return d.mengen[g]; }).map(function(g){
      var zh = d.zh[g] == null ? d.mengen[g] : d.zh[g];
      return '<div class="gr-zeile"><span class="gr-punkt" style="background:' + G_FARBE[g] + '"></span>' +
        '<span class="gr-name">' + g + '</span>' +
        '<span class="gr-mengen">' +
        '<span class="gr-ort"><span class="k">Zürich</span>' +
        '<input type="number" inputmode="numeric" data-z="' + g + '" value="' + zh +
        '" style="width:80px;font-size:24px;font-weight:800;text-align:right;padding:6px"></span>' +
        '<span class="gr-ort"><span class="k">Embrach</span><span class="v">' + (d.mengen[g] - zh) + '</span></span>' +
        '</span></div>';
    }).join("") + '</div>';
  f.innerHTML = '<div class="reihe"><button class="b geist klein" id="be-zur">Zurück</button>' +
    '<button class="b gruen" id="be-buch">Einbuchen</button></div>';

  i.querySelectorAll("[data-z]").forEach(function(x){
    x.addEventListener("input", function(){
      var g = x.getAttribute("data-z");
      d.zh[g] = Math.min(d.mengen[g], Math.max(0, parseInt(x.value, 10) || 0));
      zeichneEingang();
    });
  });
  $("#be-zur").addEventListener("click", function(){ d.schritt = 1; zeichneEingang(); });
  $("#be-buch").addEventListener("click", function(){
    var b = bestandFuer(d.titel) || bestandAnlegen(d.titel);
    var n = eingangGesamt(d);
    GR_REIHE.forEach(function(g){
      if(!d.mengen[g]) return;
      var zh = d.zh[g] == null ? d.mengen[g] : d.zh[g];
      if(zh) buche(b.schluessel, g, "zh", zh, "Eingang");
      if(d.mengen[g] - zh) buche(b.schluessel, g, "emb", d.mengen[g] - zh, "Eingang");
    });
    zeigeToast(n + " eingebucht");
    eingang = null;
    zeichneEingang();
  });
}

/* Umlagerung */
var umlager = {titel:null, schluessel:null, g:null, n:1, richtung:"emb_zh"};

function zeichneUmlager(){
  var i = $("#u-inhalt"), f = $("#u-fuss");
  var artikel = Object.keys(BESTAND);
  if(!artikel.length){
    i.innerHTML = '<div class="leerstelle">—</div>';
    f.innerHTML = "";
    return;
  }
  if(!umlager.schluessel || artikel.indexOf(umlager.schluessel) < 0){
    umlager.schluessel = artikel[0];
    umlager.titel = BESTAND[artikel[0]].titel;
  }
  var d = BESTAND[umlager.schluessel];
  var groessen = Object.keys(d.g);
  groessen.sort(function(a, c){
    var ia = GR_REIHE.indexOf(a), ic = GR_REIHE.indexOf(c);
    return (ia < 0 ? 99 : ia) - (ic < 0 ? 99 : ic);
  });
  if(groessen.length && (!umlager.g || groessen.indexOf(umlager.g) < 0)) umlager.g = groessen[0];

  var von = umlager.richtung === "emb_zh" ? "emb" : "zh";
  var nach = von === "emb" ? "zh" : "emb";
  var vorrat = umlager.g ? menge(d, umlager.g, von) : 0;
  if(umlager.n > vorrat) umlager.n = vorrat;
  if(umlager.n < 1 && vorrat > 0) umlager.n = 1;

  var h = '<div class="karte"><select id="u-art">' + artikel.map(function(k){
    return '<option value="' + esc(k) + '"' + (k === umlager.schluessel ? " selected" : "") + '>' +
      esc(BESTAND[k].titel) + '</option>';
  }).join("") + '</select></div>';

  h += '<div class="karte"><div class="chips">' + ["emb_zh","zh_emb"].map(function(r){
    return '<button class="chip rich' + (umlager.richtung === r ? " an" : "") + '" data-r="' + r + '">' +
      (r === "emb_zh" ? "Embrach → Zürich" : "Zürich → Embrach") + '</button>';
  }).join("") + '</div></div>';

  h += '<div class="karte"><div class="chips">' + groessen.map(function(g){
    return '<button class="chip' + (umlager.g === g ? " an" : "") + '" data-g="' + esc(g) + '">' +
      esc(g) + '</button>';
  }).join("") + '</div>' +
    '<div class="gr-zeile"><span class="gr-mengen" style="margin-left:0;width:100%;justify-content:space-around">' +
    '<span class="gr-ort"><span class="k">' + ORTE[von] + '</span><span class="v">' + vorrat + '</span></span>' +
    '<span class="gr-ort"><span class="k">' + ORTE[nach] + '</span><span class="v">' +
    (umlager.g ? menge(d, umlager.g, nach) : 0) + '</span></span></span></div></div>';

  h += '<div class="karte"><div class="zaehl"><button id="u-minus">−</button>' +
    '<input type="number" inputmode="numeric" id="u-n" value="' + umlager.n + '">' +
    '<button id="u-plus">+</button></div></div>';
  i.innerHTML = h;
  f.innerHTML = '<button class="b riesig" id="u-los"' +
    (vorrat > 0 && umlager.n > 0 ? "" : " disabled") + '>Umlagern</button>';

  $("#u-art").addEventListener("change", function(e){
    umlager.schluessel = e.target.value;
    umlager.titel = BESTAND[umlager.schluessel].titel;
    umlager.g = null;
    zeichneUmlager();
  });
  i.querySelectorAll("[data-r]").forEach(function(b){
    b.addEventListener("click", function(){ umlager.richtung = b.getAttribute("data-r"); zeichneUmlager(); });
  });
  i.querySelectorAll("[data-g]").forEach(function(b){
    b.addEventListener("click", function(){ umlager.g = b.getAttribute("data-g"); zeichneUmlager(); });
  });
  $("#u-plus").addEventListener("click", function(){ if(umlager.n < vorrat){ umlager.n++; zeichneUmlager(); } });
  $("#u-minus").addEventListener("click", function(){ if(umlager.n > 1){ umlager.n--; zeichneUmlager(); } });
  $("#u-n").addEventListener("change", function(e){
    umlager.n = Math.min(vorrat, Math.max(1, parseInt(e.target.value, 10) || 1));
    zeichneUmlager();
  });
  $("#u-los").addEventListener("click", function(){
    dialog(umlager.n + "× " + umlager.g,
      '<div class="titelz">' + esc(umlager.titel) + '</div>' +
      '<div class="fachgross" style="font-size:22px">' + ORTE[von] + " → " + ORTE[nach] + '</div>',
      "Umlagern", function(){
        buche(umlager.schluessel, umlager.g, von, -umlager.n, "Umlagerung");
        buche(umlager.schluessel, umlager.g, nach, umlager.n, "Umlagerung");
        zeigeToast(umlager.n + "× " + umlager.g + " → " + ORTE[nach]);
        umlager.n = 1;
        zeichneUmlager();
      });
  });
}

/* Auftrag */
function zeichneAuftrag(){
  var i = $("#t-inhalt"), f = $("#t-fuss"), bal = $("#t-balken");
  if(!AUFTRAG){
    $("#t-zahl").textContent = "";
    bal.style.display = "none";
    i.innerHTML = "";
    f.innerHTML = '<button class="b riesig" id="ta-neu">Auftrag laden</button>';
    $("#ta-neu").addEventListener("click", auftragAusBestand);
    return;
  }
  var fertig = AUFTRAG.pos.filter(function(p){ return p.ok; }).length;
  $("#t-zahl").textContent = fertig + "/" + AUFTRAG.pos.length;
  bal.style.display = "";
  bal.querySelector("i").style.width = Math.round(fertig * 100 / AUFTRAG.pos.length) + "%";

  i.innerHTML = AUFTRAG.pos.map(function(p, n){
    var b = BESTAND[p.k];
    var zh = b ? menge(b, p.g, "zh") : 0;
    var emb = b ? menge(b, p.g, "emb") : 0;
    var holen = zh < p.n && emb > 0;
    return '<div class="pos' + (p.ok ? " fertig" : "") + (holen && !p.ok ? " embrach" : "") +
      '" data-n="' + n + '">' +
      '<span class="haken">' + (p.ok ? '<svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"><path d="M4 12l6 6L20 6"/></svg>' : "") + '</span>' +
      '<span class="pgr" style="color:' + (G_FARBE[p.g] || "var(--ink)") + '">' + esc(p.g) + '</span>' +
      '<span class="haupt"><span class="pname">' + esc(p.t) + '</span>' +
      '<span class="pmeta"><span class="code">' + esc(p.f || "—") + '</span>' +
      (holen ? '<span class="warnpunkt">!</span>' : "") +
      '<span>ZH ' + zh + '</span><span>EMB ' + emb + '</span></span></span>' +
      '<span class="pmenge">' + p.n + '</span></div>';
  }).join("");

  i.querySelectorAll("[data-n]").forEach(function(el){
    el.addEventListener("click", function(){
      var n = parseInt(el.getAttribute("data-n"), 10);
      AUFTRAG.pos[n].ok = !AUFTRAG.pos[n].ok;
      sichere(LS.auftrag, AUFTRAG);
      zeichneAuftrag();
    });
  });

  var alle = fertig === AUFTRAG.pos.length;
  f.innerHTML = '<div class="reihe"><button class="b geist klein" id="ta-weg">Verwerfen</button>' +
    '<button class="b' + (alle ? " gruen" : "") + '" id="ta-fertig"' + (alle ? "" : " disabled") + '>Fertig</button></div>';
  $("#ta-weg").addEventListener("click", function(){
    dialog("Auftrag verwerfen", "", "Verwerfen", function(){
      AUFTRAG = null; sichere(LS.auftrag, AUFTRAG); zeichneAuftrag();
    });
  });
  $("#ta-fertig").addEventListener("click", function(){
    AUFTRAG.pos.forEach(function(p){
      if(!BESTAND[p.k]) return;
      var zh = menge(BESTAND[p.k], p.g, "zh");
      var abZh = Math.min(zh, p.n);
      if(abZh) buche(p.k, p.g, "zh", -abZh, "Auftrag");
      if(p.n - abZh) buche(p.k, p.g, "emb", -(p.n - abZh), "Auftrag");
    });
    zeigeToast("Gebucht");
    AUFTRAG = null;
    sichere(LS.auftrag, AUFTRAG);
    zeichneAuftrag();
  });
}

function auftragAusBestand(){
  var pos = [];
  Object.keys(BESTAND).forEach(function(k){
    var b = BESTAND[k];
    Object.keys(b.g).forEach(function(g){
      if(pos.length < 6 && (b.g[g].zh > 0 || b.g[g].emb > 0)){
        pos.push({k:k, t:b.titel, g:g, n:1 + (pos.length % 2), f:platzFuer(b.titel), ok:false});
      }
    });
  });
  if(!pos.length){ zeigeToast("Kein Bestand"); return; }
  AUFTRAG = {nr:"A-" + new Date().toISOString().slice(0, 10), pos:pos};
  sichere(LS.auftrag, AUFTRAG);
  zeichneAuftrag();
}

/* Kamera */
var stream = null, laeuft = false, detector = null, frist = 0, scanZiel = "artikel";
var SCAN_FRIST = 12000;

async function kameraStarten(ziel){
  scanZiel = ziel || "artikel";
  if(laeuft){ kameraStoppen(); return; }
  if(!("BarcodeDetector" in window)){ zeigeToast("Kein Barcode-Leser"); return; }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){ zeigeToast("Keine Kamera"); return; }
  try{
    var formate = await window.BarcodeDetector.getSupportedFormats();
    var wunsch = ["ean_13","ean_8","upc_a","upc_e","code_128"].filter(function(f){
      return formate.indexOf(f) >= 0;
    });
    detector = new window.BarcodeDetector({formats: wunsch.length ? wunsch : formate});
    stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:"environment"}, width:{ideal:1280}, height:{ideal:720}}
    });
    var video = $("#video");
    video.srcObject = stream;
    await video.play();
    $("#buehne").classList.add("an");
    laeuft = true;
    clearTimeout(frist);
    frist = setTimeout(function(){ kameraStoppen(); }, SCAN_FRIST);
    suchen();
  }catch(e){
    zeigeToast(e && e.name === "NotAllowedError" ? "Kamera nicht erlaubt" : "Kamera nicht bereit");
  }
}
function kameraStoppen(){
  laeuft = false;
  clearTimeout(frist);
  if(stream){ stream.getTracks().forEach(function(t){ t.stop(); }); stream = null; }
  $("#video").srcObject = null;
  $("#buehne").classList.remove("an");
}
async function suchen(){
  if(!laeuft) return;
  var video = $("#video");
  if(video.readyState === 4){
    try{
      var codes = await detector.detect(video);
      if(codes && codes.length){
        var wert = String(codes[0].rawValue || "").trim();
        if(wert){
          if(navigator.vibrate) navigator.vibrate(45);
          kameraStoppen();
          if(scanZiel === "eingang") eingangStart(wert); else zeigeArtikel(wert);
          return;
        }
      }
    }catch(e){}
  }
  requestAnimationFrame(suchen);
}

$("#b-import").addEventListener("click", function(){ $("#i-csv").click(); });
$("#f-manuell").addEventListener("submit", function(e){
  e.preventDefault();
  var w = $("#i-ean").value.trim();
  if(!w) return;
  $("#i-ean").value = "";
  $("#i-ean").blur();
  zeigeArtikel(w);
});
$("#i-csv").addEventListener("change", function(e){
  var datei = e.target.files && e.target.files[0];
  if(!datei) return;
  var leser = new FileReader();
  leser.onload = function(){
    var erg = katalogAusCsv(String(leser.result));
    if(erg.fehler){ zeigeToast(erg.fehler); return; }
    KATALOG = erg.varianten;
    sichere(LS.katalog, KATALOG);
    zeichneKopf();
    zeichneKatalog();
    zeigeToast(KATALOG.length + " geladen");
  };
  leser.readAsText(datei, "utf-8");
});
document.addEventListener("visibilitychange", function(){ if(document.hidden && laeuft) kameraStoppen(); });

zeichneKopf();
zeichneKatalog();

/* Beim Start und bei jeder Rueckkehr in die App den Stand vom Server holen. */
vomServer().then(function(){ zeichneKatalog(); });
sendeWarteschlange();
document.addEventListener("visibilitychange", function(){
  if(!document.hidden){ sendeWarteschlange(); vomServer(); }
});
</script>
