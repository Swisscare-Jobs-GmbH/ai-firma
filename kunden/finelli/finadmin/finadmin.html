<title>SEA · Lager</title>
<style>
:root{
  --ink:#17161a; --papier:#f4f4f2; --karte:#fff; --linie:#e3e0dc; --kopfbg:#17161a;
  --rot:#a8271c; --rot-hell:#c8503f; --grau:#77747c;
  --gruen:#2f7d43; --gelb:#b9861a;
  --xs:#8b5cf6; --s:#22c55e; --m:#3b82f6; --l:#eab308; --xl:#ef4444; --xxl:#94a3b8;
  --schatten:0 8px 24px rgba(28,18,14,.12),0 2px 5px rgba(28,18,14,.07);
}
@media (prefers-color-scheme: dark){
  :root{--ink:#f2f0ee;--papier:#121114;--karte:#1c1a1f;--linie:#2e2b32;--kopfbg:#000;
        --rot:#e0574a;--rot-hell:#f07a6d;--grau:#9a969f;--gruen:#4ade80;--gelb:#e3b34a;
        --schatten:0 8px 24px rgba(0,0,0,.5),0 2px 5px rgba(0,0,0,.3)}
}
:root[data-theme="dark"]{--ink:#f2f0ee;--papier:#121114;--karte:#1c1a1f;--linie:#2e2b32;--kopfbg:#000;
  --rot:#e0574a;--rot-hell:#f07a6d;--grau:#9a969f;--gruen:#4ade80;--gelb:#e3b34a;
  --schatten:0 8px 24px rgba(0,0,0,.5),0 2px 5px rgba(0,0,0,.3)}
:root[data-theme="light"]{--ink:#17161a;--papier:#f4f4f2;--karte:#fff;--linie:#e3e0dc;--kopfbg:#17161a;
  --rot:#a8271c;--rot-hell:#c8503f;--grau:#77747c;--gruen:#2f7d43;--gelb:#b9861a;
  --schatten:0 8px 24px rgba(28,18,14,.12),0 2px 5px rgba(28,18,14,.07)}

*{box-sizing:border-box}
body{margin:0;background:var(--papier);color:var(--ink);
  font:16px/1.45 -apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  -webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
button{font:inherit;color:inherit;border:none;background:none;cursor:pointer}
button:focus-visible,input:focus-visible,select:focus-visible{outline:3px solid var(--rot);outline-offset:2px}
input,select{font:inherit;color:inherit}

.app{display:flex;flex-direction:column;height:100dvh;max-width:560px;margin:0 auto;overflow:hidden}
.kopf{display:flex;align-items:center;gap:10px;padding:11px 15px;background:var(--kopfbg);
  color:#f2f0ee;flex:none}
.wm{font-family:Georgia,serif;font-size:19px;font-weight:700;letter-spacing:.1em}
.wm i{color:var(--rot-hell);font-style:normal}
.ort{font-size:11px;color:#9a969f;padding-left:10px;border-left:1px solid #3a373f;white-space:nowrap}
.kopf .sp{flex:1}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid currentColor;white-space:nowrap}
.pill.ok{color:#6ee7a0}.pill.warn{color:#f0b355}

main{flex:1;min-height:0;display:flex;flex-direction:column}
.view{display:none;flex-direction:column;flex:1;min-height:0}
.view.on{display:flex}
.roll{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;
  flex-direction:column;gap:11px;padding:14px 15px}
.fuss{flex:none;display:flex;flex-direction:column;gap:9px;padding:8px 15px calc(10px + env(safe-area-inset-bottom))}
h1{font-family:Georgia,serif;font-size:21px;margin:0}
.kopfzeile{display:flex;align-items:baseline;gap:10px;flex:none}
.kopfzeile .zahl{margin-left:auto;font-size:16px;font-weight:800;color:var(--grau);
  font-variant-numeric:tabular-nums}

.karte{background:var(--karte);border:1px solid var(--linie);border-radius:13px;padding:14px;
  box-shadow:var(--schatten);display:flex;flex-direction:column;gap:10px}
.lab{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--grau);font-weight:800}

.b{background:var(--rot);color:#fff;border-radius:12px;padding:15px;font-size:17px;font-weight:700;
  min-height:56px;display:flex;align-items:center;justify-content:center;gap:9px;width:100%;
  transition:transform .1s}
.b:active{transform:scale(.98)}
.b:disabled{opacity:.4}
.b.geist{background:transparent;color:var(--ink);border:1.5px solid var(--linie)}
.b.dunkel{background:var(--ink);color:var(--papier)}
.b.gruen{background:var(--gruen)}
.b.klein{min-height:46px;font-size:15px;padding:10px 15px;width:auto}
.b.riesig{min-height:78px;font-size:21px}
.reihe{display:flex;gap:9px}
.reihe .b{flex:1}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

.feldz{display:flex;flex-direction:column;gap:5px}
input[type=text],input[type=tel],input[type=number],select{background:var(--papier);
  border:1.5px solid var(--linie);border-radius:11px;padding:13px;font-size:17px;width:100%}
input[type=number]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

.buehne{position:fixed;inset:0;z-index:70;background:#000;display:none;align-items:center;
  justify-content:center;overflow:hidden}
.buehne.an{display:flex}
.buehne video{width:100%;height:100%;object-fit:cover}
.rahmen{position:absolute;left:8%;right:8%;top:34%;height:26%;border:2px solid rgba(255,255,255,.9);
  border-radius:12px;box-shadow:0 0 0 100vmax rgba(0,0,0,.55)}
.rahmen::after{content:"";position:absolute;left:0;right:0;height:2px;background:var(--rot-hell);
  top:50%;box-shadow:0 0 14px var(--rot-hell);animation:sweep 2.4s ease-in-out infinite}
@keyframes sweep{0%,100%{transform:translateY(-52px);opacity:.4}50%{transform:translateY(52px);opacity:1}}
.buehne-stopp{position:absolute;bottom:calc(34px + env(safe-area-inset-bottom));left:50%;
  transform:translateX(-50%);background:rgba(255,255,255,.18);color:#fff;border:1.5px solid rgba(255,255,255,.5);
  border-radius:30px;padding:14px 34px;font-size:16px;font-weight:700}

.titelz{font-family:Georgia,serif;font-size:20px;line-height:1.25}
.fachgross{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-size:44px;font-weight:800;
  line-height:1;font-variant-numeric:tabular-nums}
.gr-zeile{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--linie)}
.gr-zeile:last-child{border-bottom:none}
.gr-punkt{width:15px;height:15px;border-radius:4px;flex:none}
.gr-name{font-size:17px;font-weight:800;width:44px;flex:none}
.gr-mengen{margin-left:auto;display:flex;gap:14px;align-items:flex-end}
.gr-ort{display:flex;flex-direction:column;align-items:flex-end;min-width:64px}
.gr-ort .k{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--grau);font-weight:800}
.gr-ort .v{font-size:27px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.gr-zeile.hol{background:rgba(185,134,26,.17);border-radius:9px;padding:9px 8px;border-bottom:none;
  box-shadow:inset 3px 0 0 var(--gelb)}
.gr-zeile.hol .v{color:var(--gelb)}
.gr-zeile.leer .v{color:var(--grau);opacity:.45}
.warnpunkt{width:23px;height:23px;border-radius:50%;background:var(--gelb);color:#17161a;
  font-size:15px;font-weight:900;display:flex;align-items:center;justify-content:center;flex:none}

.karte-box{background:var(--papier);border:1.5px solid var(--linie);border-radius:11px;padding:7px}
.puls{animation:pulsieren 1.5s ease-in-out infinite}
@keyframes pulsieren{0%,100%{opacity:.3}50%{opacity:1}}

.zaehl{display:flex;align-items:center;gap:10px}
.zaehl button{width:54px;height:54px;border-radius:13px;background:var(--papier);
  border:1.5px solid var(--linie);font-size:27px;font-weight:700;display:flex;
  align-items:center;justify-content:center;flex:none}
.zaehl input{flex:1;text-align:center;font-size:31px;font-weight:800;padding:9px}

.zeile{display:flex;align-items:center;gap:10px;padding:12px 2px;border-bottom:1px solid var(--linie)}
.zeile:last-child{border-bottom:none}
.zeile .haupt{flex:1;min-width:0}
.zeile .name{font-size:15px;line-height:1.3;overflow-wrap:anywhere}
.zeile .sub{font-size:12px;color:var(--grau);margin-top:2px}
.code{font-family:ui-monospace,Menlo,monospace;font-size:14px;font-weight:800;padding:5px 9px;
  border-radius:7px;background:rgba(168,39,28,.13);color:var(--rot);white-space:nowrap}
.code.leer{background:transparent;border:1px dashed var(--linie);color:var(--grau);font-weight:400}
.iknopf{width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  flex:none;color:var(--grau)}
.iknopf svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.9;
  stroke-linecap:round;stroke-linejoin:round}

.pos{display:flex;align-items:center;gap:10px;padding:12px 10px;border-radius:11px;
  border:1.5px solid var(--linie);background:var(--karte)}
.pos.fertig{opacity:.42}
.pos.fertig .pname{text-decoration:line-through}
.pos.embrach{border-color:var(--gelb);background:rgba(185,134,26,.14)}
.pos .haken{width:32px;height:32px;border-radius:9px;border:2px solid var(--linie);flex:none;
  display:flex;align-items:center;justify-content:center}
.pos.fertig .haken{background:var(--gruen);border-color:var(--gruen);color:#fff}
.pos .pname{font-size:15px;font-weight:600;line-height:1.25}
.pos .pmeta{font-size:12px;color:var(--grau);margin-top:3px;display:flex;gap:8px;
  flex-wrap:wrap;align-items:center}
.pgr{font-size:20px;font-weight:800;width:44px;text-align:center;flex:none}
.pmenge{font-size:23px;font-weight:800;flex:none;min-width:34px;text-align:right;
  font-variant-numeric:tabular-nums}
.balken{height:8px;background:var(--linie);border-radius:6px;overflow:hidden;flex:none}
.balken i{display:block;height:100%;background:var(--gruen);transition:width .25s}

.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{padding:12px 16px;border-radius:11px;border:1.5px solid var(--linie);background:var(--karte);
  font-size:17px;font-weight:800;min-width:58px;text-align:center}
.chip.an{background:var(--ink);color:var(--papier);border-color:var(--ink)}
.chip.rich{flex:1;font-size:15px}

.dlg{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.6);display:none;
  align-items:flex-end;justify-content:center;padding:16px}
.dlg.an{display:flex}
.dlg-box{background:var(--karte);border-radius:16px;padding:20px;width:100%;max-width:420px;
  display:flex;flex-direction:column;gap:14px}
.dlg-titel{font-size:18px;font-weight:700}

nav{flex:none;display:flex;background:var(--karte);border-top:1px solid var(--linie);
  padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;padding:9px 2px 11px;display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:10.5px;color:var(--grau);position:relative}
nav button.on{color:var(--rot);font-weight:800}
nav button.on::before{content:"";position:absolute;top:0;left:20%;right:20%;height:3px;
  background:var(--rot);border-radius:0 0 3px 3px}
nav svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.9;
  stroke-linecap:round;stroke-linejoin:round}

.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--kopfbg);
  color:#f2f0ee;padding:13px 20px;border-radius:11px;font-size:15px;font-weight:700;
  box-shadow:var(--schatten);z-index:90;opacity:0;pointer-events:none;transition:opacity .2s;max-width:88%}
.toast.an{opacity:1}
.leerstelle{text-align:center;color:var(--grau);font-size:14px;padding:30px 12px}

/* Ort-Tab: Mehrfachauswahl + anwaehlbare Karte */
.owahl{display:flex;align-items:center;gap:11px;padding:13px 6px;border-bottom:1px solid var(--linie)}
.owahl:last-child{border-bottom:none}
.owahl .haupt{flex:1;min-width:0}
.owahl .ohaken{width:27px;height:27px;border-radius:8px;border:2px solid var(--linie);flex:none;
  display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff}
.owahl.an{background:rgba(47,125,67,.12);border-radius:9px}
.owahl.an .ohaken{background:var(--gruen);border-color:var(--gruen)}
.owahl.an .ohaken::after{content:"\2713"}
.owahl .code{margin-left:auto}
.karte-box g[data-fach]{cursor:pointer}
.zielz{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-size:26px;font-weight:800;
  line-height:1;font-variant-numeric:tabular-nums}
.o-namen{font-size:14px;color:var(--grau);line-height:1.4;overflow-wrap:anywhere}

/* Produktbilder */
.thumb{width:50px;height:50px;border-radius:10px;object-fit:cover;flex:none;
  border:1px solid var(--linie);background:var(--papier)}
.thumb-leer{width:50px;height:50px;border-radius:10px;flex:none;border:1px solid var(--linie);
  background:var(--papier);display:flex;align-items:center;justify-content:center}
.thumb-leer svg{width:22px;height:22px;stroke:var(--grau);fill:none;stroke-width:1.6}
.bild-gross{width:100%;max-height:44vh;object-fit:contain;display:block;background:#fff;border-radius:12px}
.bild-karte{padding:6px;background:#fff}

/* ---- Funktions-Farben (idiotensicher: jede Funktion eine Farbe) ---- */
:root{
  --f-info:#2563eb; --f-eingang:#1f9d4d; --f-umlager:#e0611c; --f-bestell:#7c3aed;
  --f-katalog:#5b6675; --akz:var(--f-info);
}
@media (prefers-color-scheme: dark){
  :root{--f-info:#4f83f7; --f-eingang:#34c56d; --f-umlager:#f5852f; --f-bestell:#a06bf0;
        --f-katalog:#8590a0}
}
:root[data-theme="dark"]{--f-info:#4f83f7; --f-eingang:#34c56d; --f-umlager:#f5852f;
  --f-bestell:#a06bf0; --f-katalog:#8590a0}
:root[data-theme="light"]{--f-info:#2563eb; --f-eingang:#1f9d4d; --f-umlager:#e0611c;
  --f-bestell:#7c3aed; --f-katalog:#5b6675}

.b.akz{background:var(--akz);color:#fff}
.b.akz.geist{background:transparent;color:var(--ink);border:2px solid var(--akz)}

/* Kopfbalken je Funktion, farbig */
.kopfbar{display:flex;align-items:center;gap:12px;padding:13px 15px;background:var(--akz);
  color:#fff;flex:none}
.kopfbar h1{font-family:Georgia,serif;font-size:20px;margin:0;color:#fff}
.kopfbar .zahl{margin-left:auto;font-size:14px;font-weight:800;color:rgba(255,255,255,.85);
  font-variant-numeric:tabular-nums}
.heimknopf{width:40px;height:40px;border-radius:11px;background:rgba(255,255,255,.18);flex:none;
  display:flex;align-items:center;justify-content:center}
.heimknopf svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.4;stroke-linecap:round;
  stroke-linejoin:round}

/* Start-Kacheln */
#v-heim{padding:16px 15px 20px}
.heim{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.kachel{border-radius:18px;padding:18px 16px;min-height:132px;display:flex;flex-direction:column;
  justify-content:space-between;color:#fff;box-shadow:var(--schatten);position:relative;overflow:hidden}
.kachel:active{transform:scale(.98)}
.kachel svg{width:34px;height:34px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;
  stroke-linejoin:round;opacity:.95}
.kachel .kt{font-size:19px;font-weight:800;line-height:1.15}
.kachel .ku{font-size:12.5px;opacity:.9;margin-top:2px;font-weight:600}
.kachel .badge{position:absolute;top:13px;right:14px;background:#fff;color:#17161a;font-size:13px;
  font-weight:900;min-width:24px;height:24px;border-radius:12px;padding:0 7px;display:flex;
  align-items:center;justify-content:center}
.k-info{background:var(--f-info)}.k-eingang{background:var(--f-eingang)}
.k-umlager{background:var(--f-umlager)}.k-bestell{background:var(--f-bestell)}
.k-katalog{background:var(--f-katalog);grid-column:1 / -1;min-height:76px;flex-direction:row;
  align-items:center;gap:14px}
.k-katalog .kt{font-size:17px}

/* Produktbild klein neben Text + Lightbox */
.a-kopf{display:flex;gap:13px;align-items:flex-start}
.a-bild{width:96px;height:96px;border-radius:12px;object-fit:cover;flex:none;border:1px solid var(--linie);
  background:#fff;cursor:zoom-in}
.a-bild-leer{width:96px;height:96px;border-radius:12px;flex:none;border:1px solid var(--linie);
  background:var(--papier);display:flex;align-items:center;justify-content:center}
.a-bild-leer svg{width:32px;height:32px;stroke:var(--grau);fill:none;stroke-width:1.5}
.a-kopf .info{flex:1;min-width:0;display:flex;flex-direction:column;gap:7px}
.a-gr{display:flex;align-items:center;gap:8px;font-size:14px}
.a-gr .g{font-weight:800;min-width:38px}
.a-gr .m{color:var(--grau);font-variant-numeric:tabular-nums}
.a-gr.hol{color:var(--gelb);font-weight:700}
.lightbox{position:fixed;inset:0;z-index:85;background:rgba(0,0,0,.92);display:none;
  align-items:center;justify-content:center;padding:16px}
.lightbox.an{display:flex}
.lightbox img{max-width:100%;max-height:100%;object-fit:contain;border-radius:8px}

/* Segmented control (Umlagern: Standort / Lagerplatz) */
.seg{display:flex;gap:0;background:var(--papier);border:1.5px solid var(--linie);border-radius:12px;
  padding:4px;flex:none}
.seg button{flex:1;padding:11px 6px;border-radius:9px;font-size:15px;font-weight:800;color:var(--grau)}
.seg button.an{background:var(--akz);color:#fff}

/* Wareneingang gross */
.gross-menge{display:flex;align-items:center;justify-content:center;gap:16px;padding:8px 0}
.gross-menge button{width:66px;height:66px;border-radius:16px;background:var(--papier);
  border:1.5px solid var(--linie);font-size:34px;font-weight:700;flex:none;
  display:flex;align-items:center;justify-content:center}
.gross-menge input{width:120px;text-align:center;font-size:46px;font-weight:800;padding:6px;
  font-variant-numeric:tabular-nums;background:transparent;border:none}

/* Bestellungen */
.best{display:flex;align-items:center;gap:12px;padding:14px 12px;border-radius:13px;
  border:1.5px solid var(--linie);background:var(--karte);margin-bottom:10px;box-shadow:var(--schatten)}
.best .nr{font-weight:800;font-size:16px}
.best .meta{font-size:12.5px;color:var(--grau);margin-top:2px;display:flex;gap:9px;flex-wrap:wrap}
.best .stk{margin-left:auto;font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;flex:none}
.best-zustand{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;
  padding:3px 8px;border-radius:20px;flex:none}
.zu-offen{background:rgba(224,97,28,.16);color:var(--f-umlager)}
.zu-lauf{background:rgba(37,99,235,.16);color:var(--f-info)}
.zu-fertig{background:rgba(31,157,77,.18);color:var(--f-eingang)}
.zu-versendet{background:rgba(124,58,237,.16);color:var(--f-bestell)}
.timer{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:40px;font-weight:800;
  text-align:center;font-variant-numeric:tabular-nums;padding:6px 0}
.pos-emb{border-color:var(--gelb);background:rgba(185,134,26,.12)}
.pos .pbild{width:44px;height:44px;border-radius:9px;object-fit:cover;flex:none;border:1px solid var(--linie);background:#fff}
</style>

<div class="app">
  <header class="kopf">
    <span class="wm">SEA<i>.</i></span>
    <span class="ort">Zürich · Lagerraum 1</span>
    <span class="sp"></span>
    <span class="pill warn" id="p-katalog">0</span>
  </header>

  <main>
    <section class="view on" id="v-heim">
      <div class="heim">
        <button class="kachel k-info" data-v="info">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <div><div class="kt">Produkt-Info</div><div class="ku">Scannen oder suchen</div></div>
        </button>
        <button class="kachel k-eingang" data-v="eingang">
          <svg viewBox="0 0 24 24"><path d="M21 8v13H3V8M1 3h22v5H1zM12 11v6M9 14l3 3 3-3"/></svg>
          <div><div class="kt">Wareneingang</div><div class="ku">Ware einbuchen</div></div>
        </button>
        <button class="kachel k-umlager" data-v="umlager">
          <svg viewBox="0 0 24 24"><path d="M17 1l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          <div><div class="kt">Umlagern</div><div class="ku">Standort &amp; Lagerplatz</div></div>

    fachInFlight = false;
    zeichneKopf();
  });
}

/* Angelernte EAN-Codes gehen ueber eine eigene Warteschlange raus, mit Wiederholung
   bei Fehler. So landet jeder Code sicher auf dem Server und damit auf allen Geraeten. */
function eanZumServer(eintrag){
  EANWARTE = EANWARTE.filter(function(x){ return x.ean !== eintrag.ean; });
  EANWARTE.push(eintrag);
  sichere(LS.eanwarte, EANWARTE);
  sendeEanWarte();
}

var eanInFlight = false;
function sendeEanWarte(){
  if(eanInFlight || !EANWARTE.length) return Promise.resolve();
  eanInFlight = true;
  var naechste = EANWARTE[0];
  return fetch(SERVER + "/api/ean", {
    method:"POST", headers:kopfZeilen(), body:JSON.stringify(naechste)
  }).then(function(r){
    if(!r.ok) throw new Error("HTTP " + r.status);
    EANWARTE.shift();
    sichere(LS.eanwarte, EANWARTE);
    VERBUNDEN = true;
    eanInFlight = false;
    if(EANWARTE.length) return sendeEanWarte();
  }).catch(function(e){
    console.log("sendeEanWarte FEHLER: " + (e && e.message ? e.message : e));
    eanInFlight = false;
  });
}

function vomServer(){
  return fetch(SERVER + "/api/bestand", {headers:kopfZeilen()}).then(function(r){
    if(!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  }).then(function(d){
    var neu = {}, kat = [];
    (d.zeilen || []).forEach(function(z){
      if(!neu[z.artikel]) neu[z.artikel] = {titel:z.titel, fach:z.fach || null, g:{}, auf:{}, sl:{}};
      if(z.fach && !neu[z.artikel].fach) neu[z.artikel].fach = z.fach;
      if(z.bild){ neu[z.artikel].bild = z.bild; BILDER[z.artikel] = z.bild; }
      neu[z.artikel].g[z.groesse] = {zh:z.zh || 0, emb:z.emb || 0};
      var vid = z.artikel + "|" + z.groesse + "|";
      kat.push({ean:z.ean || "", titel:z.titel, groesse:z.groesse, farbe:"", sku:"",
                preis:"", handle:z.artikel, vid:vid, bild:z.bild || ""});
    });
    // Der Server ist die Quelle des Katalogs, nicht mehr die CSV.
    KATALOG = kat;
    sichere(LS.katalog, KATALOG);
    // Nur Artikel mit Bestand oder Fach uebernehmen, sonst waeren es 1354 leere Zeilen.
    var gefiltert = {};
    Object.keys(neu).forEach(function(k){
      var a = neu[k], hat = false;
      Object.keys(a.g).forEach(function(g){ if(a.g[g].zh || a.g[g].emb) hat = true; });
      if(hat || a.fach) gefiltert[k] = a;
    });
    Object.keys(gefiltert).forEach(function(k){
      if(BESTAND[k]){ gefiltert[k].auf = BESTAND[k].auf || {}; gefiltert[k].sl = BESTAND[k].sl || {}; }
    });
    BESTAND = gefiltert;
    Object.keys(BESTAND).forEach(function(k){
      if(BESTAND[k].fach) PLAETZE[k] = BESTAND[k].fach;
    });
    // Der Server ist die Wahrheit fuer EANs: lokal genau uebernehmen, was er liefert.
    // So gibt es kein Hin-und-Her, wenn zwei Geraete denselben Artikel anlernen.
    // Noch nicht hochgeladene (in der Warteschlange steckende) Codes bleiben erhalten.
    EANS = {};
    (d.zeilen || []).forEach(function(z){
      if(z.ean) EANS[z.ean] = z.artikel + "|" + z.groesse + "|";
    });
    EANWARTE.forEach(function(e){ EANS[e.ean] = e.artikel + "|" + e.groesse + "|"; });
    sichere(LS.bestand, BESTAND);
    sichere(LS.plaetze, PLAETZE);
    sichere(LS.eans, EANS);
    sichere(LS.bilder, BILDER);
    VERBUNDEN = true;
    zeichneKopf();
    return true;
  }).catch(function(e){
    console.log("vomServer FEHLER: " + (e && e.message ? e.message : e));
    LETZTER_FEHLER = String(e && e.message ? e.message : e);
    VERBUNDEN = false;
    zeichneKopf();
    return false;
  });
}

/* CSV */
function csvZerlegen(text){
  var zeilen = [], feld = "", zeile = [], anf = false;
  for(var i = 0; i < text.length; i++){
    var z = text[i];
    if(anf){
      if(z === '"'){ if(text[i+1] === '"'){ feld += '"'; i++; } else { anf = false; } }
      else { feld += z; }
    } else {
      if(z === '"'){ anf = true; }
      else if(z === ","){ zeile.push(feld); feld = ""; }
      else if(z === "\n"){ zeile.push(feld); zeilen.push(zeile); zeile = []; feld = ""; }
      else if(z !== "\r"){ feld += z; }
    }
  }
  if(feld.length || zeile.length){ zeile.push(feld); zeilen.push(zeile); }
  return zeilen;
}

function katalogAusCsv(text){
  var zeilen = csvZerlegen(text);
  if(!zeilen.length) return {varianten:[], fehler:"Datei leer"};
  var kopf = zeilen[0].map(function(h){ return h.trim(); });
  function idx(n){
    for(var i = 0; i < kopf.length; i++){ if(kopf[i].toLowerCase() === n.toLowerCase()) return i; }
    return -1;
  }
  var iT = idx("Title"), iH = idx("Handle"), iB = idx("Variant Barcode"),
      iS = idx("Variant SKU"), iP = idx("Variant Price");
  var oN = [idx("Option1 Name"), idx("Option2 Name"), idx("Option3 Name")];
  var oW = [idx("Option1 Value"), idx("Option2 Value"), idx("Option3 Value")];
  if(iT < 0) return {varianten:[], fehler:"Spalte Title fehlt"};

  var v = [], lt = "", lh = "";
  for(var r = 1; r < zeilen.length; r++){
    var z = zeilen[r];
    if(!z || z.length < 2) continue;
    var titel = (z[iT] || "").trim() || lt;
    if(titel) lt = titel;
    var handle = (iH >= 0 ? (z[iH] || "").trim() : "") || lh;
    if(handle) lh = handle;
    if(!titel) continue;
    var ean = iB >= 0 ? (z[iB] || "").trim() : "";
    var g = "", farbe = "";
    for(var o = 0; o < 3; o++){
      if(oN[o] < 0 || oW[o] < 0) continue;
      var n = (z[oN[o]] || "").trim().toLowerCase(), w = (z[oW[o]] || "").trim();
      if(!w) continue;
      if(/gr(ö|oe)sse|size/.test(n)) g = w;
      else if(/farbe|colou?r/.test(n)) farbe = w;
      else if(!g && /^(xxs|xs|s|m|l|xl|xxl|\d{2})$/i.test(w)) g = w;
    }
    var gn = normGroesse(g);
    v.push({ean:ean, titel:titel, groesse:gn, farbe:farbe,
            sku:iS >= 0 ? (z[iS] || "").trim() : "",
            preis:iP >= 0 ? (z[iP] || "").trim() : "",
            handle:handle, vid:(handle || normal(titel)) + "|" + gn + "|" + farbe});
  }
  if(!v.length) return {varianten:[], fehler:"Keine Artikel"};
  return {varianten:v, fehler:null};
}

function findeVariante(code){
  var v = KATALOG.filter(function(x){ return x.ean && x.ean === code; })[0];
  if(v) return v;
  var vid = EANS[code];
  if(!vid) return null;
  return KATALOG.filter(function(x){ return x.vid === vid; })[0] || null;
}
function lerneEan(code, vid){
  EANS[code] = vid;
  sichere(LS.eans, EANS);
  zeichneKopf();
  var teile = String(vid).split("|");
  eanZumServer({ean:code, artikel:teile[0], groesse:teile[1]});
}

function exportEans(){
  var z = ["Handle,Title,Option1 Value,Variant SKU,Variant Barcode"];
  Object.keys(EANS).forEach(function(code){
    var v = KATALOG.filter(function(x){ return x.vid === EANS[code]; })[0];
    if(!v) return;
    function q(s){ return '"' + String(s == null ? "" : s).replace(/"/g, '""') + '"'; }
    z.push([q(v.handle), q(v.titel), q(v.groesse), q(v.sku), q(code)].join(","));
  });
  if(z.length < 2){ zeigeToast("Nichts angelernt"); return; }
  var blob = new Blob([z.join("\n")], {type:"text/csv;charset=utf-8"});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "sea-eans.csv";
  document.body.appendChild(a); a.click();
  setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); }, 800);
  zeigeToast((z.length - 1) + " exportiert");
}

      '<span class="gr-mengen">' +
      '<span class="gr-ort"><span class="k">Zürich</span>' +

      menge(d, g, "zh") + '" style="width:80px;font-size:20px;font-weight:800;text-align:right;padding:8px"></span>' +
      '<span class="gr-ort"><span class="k">Embrach</span>' +
      '<input type="number" inputmode="numeric" data-g="' + esc(g) + '" data-o="emb" value="' +
      menge(d, g, "emb") + '" style="width:80px;font-size:20px;font-weight:800;text-align:right;padding:8px"></span>' +
      '</span></div>';
  });

  dialog(aktuell.titel, h, "Speichern", function(){

/* Wareneingang */
/* Wareneingang: Artikel scannen, dann eingeben wie viele Stueck gekommen sind.
   Wird direkt in Zuerich eingebucht (Verkaufslager). Umlagern nach Embrach separat. */
var eingang = null;  // {titel, groesse, fach, bild, n}

function zeichneEingang(){
  var i = $("#e-inhalt"), f = $("#e-fuss");
  if(!eingang){
    i.innerHTML = '<div class="leerstelle">Artikel scannen. Dann eingeben, wie viele Stück ' +
      'gekommen sind. Sie werden in Zürich eingebucht.</div>';
    f.innerHTML = '<button class="b riesig akz" id="be-scan">Scannen</button>' +
      '<form class="reihe" id="be-form"><input type="tel" id="be-ean" inputmode="numeric" ' +
      'placeholder="oder EAN eingeben" autocomplete="off"><button class="b klein akz" type="submit">OK</button></form>';
    $("#be-scan").addEventListener("click", function(){ kameraStarten("eingang"); });
    $("#be-form").addEventListener("submit", function(e){
      e.preventDefault();
      var w = $("#be-ean").value.trim();
      if(w){ $("#be-ean").value = ""; $("#be-ean").blur(); eingangStart(w); }
    });
    return;
  }
  var d = eingang;
  var burl = d.bild || bildFuer(d.titel);
  i.innerHTML = '<div class="karte"><div class="a-kopf">' +
    (burl ? '<img class="a-bild" src="' + esc(bildUrl(burl, 400)) + '" alt="" onerror="seaBildFehler(this)">'
          : '<span class="a-bild-leer">' + LEER_SVG + '</span>') +
    '<div class="info"><div class="titelz">' + esc(d.titel) + '</div>' +
    '<div class="a-gr"><span class="g">' + esc(d.groesse || "—") + '</span><span class="m">Grösse</span></div>' +
    (d.fach ? '<div class="a-gr"><span class="g">' + esc(d.fach) + '</span><span class="m">Lagerplatz</span></div>' : "") +
    '</div></div></div>' +
    '<div class="karte"><span class="lab">Wie viele gekommen?</span>' +
    '<div class="gross-menge"><button id="e-minus">−</button>' +
    '<input type="number" inputmode="numeric" id="e-n" value="' + d.n + '"><button id="e-plus">+</button></div></div>';
  f.innerHTML = '<div class="reihe"><button class="b geist klein" id="e-ab">Abbrechen</button>' +
    '<button class="b akz" id="e-buch">' + d.n + ' einbuchen</button></div>';

  function frisch(){ $("#e-n").value = d.n; $("#e-buch").textContent = d.n + " einbuchen"; }
  $("#e-plus").addEventListener("click", function(){ d.n++; frisch(); });
  $("#e-minus").addEventListener("click", function(){ if(d.n > 1){ d.n--; frisch(); } });
  $("#e-n").addEventListener("input", function(e){
    d.n = Math.max(1, parseInt(e.target.value, 10) || 1);
    $("#e-buch").textContent = d.n + " einbuchen";
  });
  $("#e-ab").addEventListener("click", function(){ eingang = null; zeichneEingang(); });
  $("#e-buch").addEventListener("click", function(){
    var b = bestandFuer(d.titel) || bestandAnlegen(d.titel);
    var g = d.groesse || (aktuell && aktuell.groesse) || "ONE SIZE";
    buche(b.schluessel, g, "zh", d.n, "Eingang");
    zeigeToast(d.n + "× " + g + " eingebucht");
    eingang = null;
    zeichneEingang();
  });
}

function eingangStart(code){
  var v = findeVariante(code);
  if(!v){ zeigeAnlernen(code); return; }
  eingang = {titel:v.titel, groesse:v.groesse || "", fach:platzFuer(v.titel), bild:v.bild, n:1};
  zeige("eingang");
  zeichneEingang();
}

/* Umlagerung */
var umlager = {titel:null, schluessel:null, g:null, n:1, richtung:"emb_zh"};

function zeichneUmlager(){
  var i = $("#u-inhalt"), f = $("#u-fuss");
  var artikel = Object.keys(BESTAND);
  if(!artikel.length){
    i.innerHTML = '<div class="leerstelle">—</div>';
    f.innerHTML = "";
    return;
  }
  if(!umlager.schluessel || artikel.indexOf(umlager.schluessel) < 0){
    umlager.schluessel = artikel[0];
    umlager.titel = BESTAND[artikel[0]].titel;
  }
  var d = BESTAND[umlager.schluessel];
  var groessen = Object.keys(d.g);
  groessen.sort(function(a, c){
    var ia = GR_REIHE.indexOf(a), ic = GR_REIHE.indexOf(c);
    return (ia < 0 ? 99 : ia) - (ic < 0 ? 99 : ic);
  });
  if(groessen.length && (!umlager.g || groessen.indexOf(umlager.g) < 0)) umlager.g = groessen[0];

  var von = umlager.richtung === "emb_zh" ? "emb" : "zh";
  var nach = von === "emb" ? "zh" : "emb";
  var vorrat = umlager.g ? menge(d, umlager.g, von) : 0;
  if(umlager.n > vorrat) umlager.n = vorrat;
  if(umlager.n < 1 && vorrat > 0) umlager.n = 1;

  var h = '<div class="karte"><select id="u-art">' + artikel.map(function(k){
    return '<option value="' + esc(k) + '"' + (k === umlager.schluessel ? " selected" : "") + '>' +
      esc(BESTAND[k].titel) + '</option>';
  }).join("") + '</select></div>';

  h += '<div class="karte"><div class="chips">' + ["emb_zh","zh_emb"].map(function(r){
    return '<button class="chip rich' + (umlager.richtung === r ? " an" : "") + '" data-r="' + r + '">' +
      (r === "emb_zh" ? "Embrach → Zürich" : "Zürich → Embrach") + '</button>';
  }).join("") + '</div></div>';

  h += '<div class="karte"><div class="chips">' + groessen.map(function(g){
    return '<button class="chip' + (umlager.g === g ? " an" : "") + '" data-g="' + esc(g) + '">' +
      esc(g) + '</button>';
  }).join("") + '</div>' +
    '<div class="gr-zeile"><span class="gr-mengen" style="margin-left:0;width:100%;justify-content:space-around">' +
    '<span class="gr-ort"><span class="k">' + ORTE[von] + '</span><span class="v">' + vorrat + '</span></span>' +
    '<span class="gr-ort"><span class="k">' + ORTE[nach] + '</span><span class="v">' +
    (umlager.g ? menge(d, umlager.g, nach) : 0) + '</span></span></span></div></div>';

  h += '<div class="karte"><div class="zaehl"><button id="u-minus">−</button>' +
    '<input type="number" inputmode="numeric" id="u-n" value="' + umlager.n + '">' +
    '<button id="u-plus">+</button></div></div>';
  i.innerHTML = h;
  f.innerHTML = '<button class="b riesig" id="u-los"' +
    (vorrat > 0 && umlager.n > 0 ? "" : " disabled") + '>Umlagern</button>';

  $("#u-art").addEventListener("change", function(e){
    umlager.schluessel = e.target.value;
    umlager.titel = BESTAND[umlager.schluessel].titel;
    umlager.g = null;
    zeichneUmlager();
  });
  i.querySelectorAll("[data-r]").forEach(function(b){
    b.addEventListener("click", function(){ umlager.richtung = b.getAttribute("data-r"); zeichneUmlager(); });
  });
  i.querySelectorAll("[data-g]").forEach(function(b){
    b.addEventListener("click", function(){ umlager.g = b.getAttribute("data-g"); zeichneUmlager(); });
  });
  $("#u-plus").addEventListener("click", function(){ if(umlager.n < vorrat){ umlager.n++; zeichneUmlager(); } });
  $("#u-minus").addEventListener("click", function(){ if(umlager.n > 1){ umlager.n--; zeichneUmlager(); } });
  $("#u-n").addEventListener("change", function(e){
    umlager.n = Math.min(vorrat, Math.max(1, parseInt(e.target.value, 10) || 1));
    zeichneUmlager();
  });
  $("#u-los").addEventListener("click", function(){
    dialog(umlager.n + "× " + umlager.g,
      '<div class="titelz">' + esc(umlager.titel) + '</div>' +
      '<div class="fachgross" style="font-size:22px">' + ORTE[von] + " → " + ORTE[nach] + '</div>',
      "Umlagern", function(){
        buche(umlager.schluessel, umlager.g, von, -umlager.n, "Umlagerung");
        buche(umlager.schluessel, umlager.g, nach, umlager.n, "Umlagerung");
        zeigeToast(umlager.n + "× " + umlager.g + " → " + ORTE[nach]);
        umlager.n = 1;
        zeichneUmlager();
      });
  });
}

/* Auftrag */
function zeichneAuftrag(){
  var i = $("#t-inhalt"), f = $("#t-fuss"), bal = $("#t-balken");
  if(!AUFTRAG){
    $("#t-zahl").textContent = "";
    bal.style.display = "none";
    i.innerHTML = "";
    f.innerHTML = '<button class="b riesig" id="ta-neu">Auftrag laden</button>';
    $("#ta-neu").addEventListener("click", auftragAusBestand);
    return;
  }
  var fertig = AUFTRAG.pos.filter(function(p){ return p.ok; }).length;
  $("#t-zahl").textContent = fertig + "/" + AUFTRAG.pos.length;
  bal.style.display = "";
  bal.querySelector("i").style.width = Math.round(fertig * 100 / AUFTRAG.pos.length) + "%";

  i.innerHTML = AUFTRAG.pos.map(function(p, n){
    var b = BESTAND[p.k];
    var zh = b ? menge(b, p.g, "zh") : 0;
    var emb = b ? menge(b, p.g, "emb") : 0;
    var holen = zh < p.n && emb > 0;
    return '<div class="pos' + (p.ok ? " fertig" : "") + (holen && !p.ok ? " embrach" : "") +
      '" data-n="' + n + '">' +
      '<span class="haken">' + (p.ok ? '<svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"><path d="M4 12l6 6L20 6"/></svg>' : "") + '</span>' +
      '<span class="pgr" style="color:' + (G_FARBE[p.g] || "var(--ink)") + '">' + esc(p.g) + '</span>' +
      '<span class="haupt"><span class="pname">' + esc(p.t) + '</span>' +
      '<span class="pmeta"><span class="code">' + esc(p.f || "—") + '</span>' +
      (holen ? '<span class="warnpunkt">!</span>' : "") +
      '<span>ZH ' + zh + '</span><span>EMB ' + emb + '</span></span></span>' +
      '<span class="pmenge">' + p.n + '</span></div>';
  }).join("");

  i.querySelectorAll("[data-n]").forEach(function(el){
    el.addEventListener("click", function(){
      var n = parseInt(el.getAttribute("data-n"), 10);
      AUFTRAG.pos[n].ok = !AUFTRAG.pos[n].ok;
      sichere(LS.auftrag, AUFTRAG);
      zeichneAuftrag();
    });
  });

  var alle = fertig === AUFTRAG.pos.length;
  f.innerHTML = '<div class="reihe"><button class="b geist klein" id="ta-weg">Verwerfen</button>' +
    '<button class="b' + (alle ? " gruen" : "") + '" id="ta-fertig"' + (alle ? "" : " disabled") + '>Fertig</button></div>';
  $("#ta-weg").addEventListener("click", function(){
    dialog("Auftrag verwerfen", "", "Verwerfen", function(){
      AUFTRAG = null; sichere(LS.auftrag, AUFTRAG); zeichneAuftrag();
    });
  });
  $("#ta-fertig").addEventListener("click", function(){
    AUFTRAG.pos.forEach(function(p){
      if(!BESTAND[p.k]) return;
      var zh = menge(BESTAND[p.k], p.g, "zh");
      var abZh = Math.min(zh, p.n);
      if(abZh) buche(p.k, p.g, "zh", -abZh, "Auftrag");
      if(p.n - abZh) buche(p.k, p.g, "emb", -(p.n - abZh), "Auftrag");
    });
    zeigeToast("Gebucht");
    AUFTRAG = null;
    sichere(LS.auftrag, AUFTRAG);
    zeichneAuftrag();
  });
}

function auftragAusBestand(){
  var pos = [];
  Object.keys(BESTAND).forEach(function(k){
    var b = BESTAND[k];
    Object.keys(b.g).forEach(function(g){
      if(pos.length < 6 && (b.g[g].zh > 0 || b.g[g].emb > 0)){
        pos.push({k:k, t:b.titel, g:g, n:1 + (pos.length % 2), f:platzFuer(b.titel), ok:false});
      }
    });
  });
  if(!pos.length){ zeigeToast("Kein Bestand"); return; }
  AUFTRAG = {nr:"A-" + new Date().toISOString().slice(0, 10), pos:pos};
  sichere(LS.auftrag, AUFTRAG);
  zeichneAuftrag();
}

/* Ort — Lagerplatz eines oder mehrerer Artikel aendern.
   Nur hier ist die Karte anwaehlbar; im Scan bleibt sie reine Anzeige.
   Platz gilt pro Artikel, die Groessen verteilen sich im Fach auf die Ebenen. */
var ortWahl = {};        // key -> true, mehrere Artikel gleichzeitig
var ortSuche = "";
var ortModus = "liste";  // "liste" oder "karte"
var ortZiel = null;      // im Karten-Modus angetipptes Zielfach

function bestandSumme(k){
  var b = BESTAND[k];
  if(!b || !b.g) return 0;
  var s = 0; Object.keys(b.g).forEach(function(g){ s += (b.g[g].zh || 0) + (b.g[g].emb || 0); });
  return s;
}
function ortTitel(key){ return (BESTAND[key] && BESTAND[key].titel) || key; }

function ortEinheiten(){
  var map = {};
  // Echte Artikel vom Server zuerst. Ihr Platz kommt aus dem passenden Muster.
  Object.keys(BESTAND).forEach(function(k){
    var t = BESTAND[k].titel || k;
    map[k] = {key:k, titel:t, fach:PLAETZE[k] || platzFuer(t) || null, stk:bestandSumme(k),
              bild:BESTAND[k].bild || bildFuer(t)};
  });
  // Welche Muster deckt schon ein echter Artikel ab? Jedes Muster, das als Text im
  // Titel steckt (nicht nur das laengste), damit auch kurze Pilot-Muster wegfallen.
  var abgedeckt = {};
  Object.keys(BESTAND).forEach(function(k){
    var t = normal(BESTAND[k].titel || k);
    Object.keys(PLAETZE).forEach(function(p){
      if(p !== k && t.indexOf(p) >= 0) abgedeckt[p] = true;
    });
  });
  // Uebrige Muster (z.B. Zubehoer ohne Bestand) einzeln zeigen, damit man sie platzieren kann.
  Object.keys(PLAETZE).forEach(function(k){
    if(map[k] || abgedeckt[k]) return;
    map[k] = {key:k, titel:ortTitel(k), fach:PLAETZE[k], stk:bestandSumme(k),
              bild:bildFuer(ortTitel(k))};
  });
  return map;
}

function ortListe(){
  var alle = ortEinheiten(), liste;
  if(normal(ortSuche).length >= 2){
    var q = normal(ortSuche), treffer = {};
    Object.keys(alle).forEach(function(k){
      if(normal(alle[k].titel).indexOf(q) >= 0 || k.indexOf(q) >= 0) treffer[k] = alle[k];
    });
    KATALOG.forEach(function(v){
      if(normal(v.titel).indexOf(q) < 0) return;
      var key = musterFuer(v.titel) || normal(v.titel);
      if(!treffer[key]) treffer[key] = {key:key, titel:v.titel,
        fach:PLAETZE[key] || platzFuer(v.titel) || null, stk:bestandSumme(key),
        bild:v.bild || bildFuer(v.titel)};
    });
    liste = Object.keys(treffer).map(function(k){ return treffer[k]; });
  } else {
    liste = Object.keys(alle).map(function(k){ return alle[k]; });
  }
  liste.sort(function(a, b){ return (a.titel || "").localeCompare(b.titel || ""); });
  return liste.slice(0, 80);
}

function zeichneOrt(){
  if(ortModus === "karte"){ ortKarteAnsicht(); return; }
  var i = $("#o-inhalt"), f = $("#o-fuss");
  var liste = ortListe();
  var gewaehlt = Object.keys(ortWahl).length;

  var h = '<div class="karte"><input type="text" id="o-suche" placeholder="Artikel suchen" ' +
    'autocomplete="off" value="' + esc(ortSuche) + '"></div><div class="karte">';
  h += liste.length ? liste.map(function(e){
    return '<div class="owahl' + (ortWahl[e.key] ? " an" : "") + '" data-key="' + esc(e.key) + '">' +
      '<span class="ohaken"></span>' + thumbTag(e.bild) +
      '<span class="haupt"><span class="name">' + esc(e.titel) + '</span>' +
      '<span class="sub">' + (e.stk ? e.stk + " Stk" : "kein Bestand") + '</span></span>' +
      '<span class="code' + (e.fach ? "" : " leer") + '">' + esc(e.fach || "—") + '</span></div>';
  }).join("") : '<div class="leerstelle">Nichts gefunden</div>';
  h += '</div>';
  i.innerHTML = h;

  f.innerHTML = '<button class="b riesig" id="o-weiter"' + (gewaehlt ? "" : " disabled") + '>' +
    (gewaehlt ? gewaehlt + " Artikel · Platz wählen" : "Artikel wählen") + '</button>';

  $("#o-suche").addEventListener("input", function(e){
    ortSuche = e.target.value;
    zeichneOrt();
    var n = $("#o-suche"); n.focus(); n.setSelectionRange(ortSuche.length, ortSuche.length);
  });
  i.querySelectorAll(".owahl").forEach(function(el){
    el.addEventListener("click", function(){
      var k = el.getAttribute("data-key");
      if(ortWahl[k]) delete ortWahl[k]; else ortWahl[k] = true;
      el.classList.toggle("an", !!ortWahl[k]);
      var g = Object.keys(ortWahl).length, btn = $("#o-weiter");
      btn.disabled = !g;
      btn.textContent = g ? (g + " Artikel · Platz wählen") : "Artikel wählen";
    });
  });
  $("#o-weiter").addEventListener("click", function(){
    if(!Object.keys(ortWahl).length) return;
    ortModus = "karte"; ortZiel = null; zeichneOrt();
  });
}

function ortKarteAnsicht(){
  var i = $("#o-inhalt"), f = $("#o-fuss");
  var keys = Object.keys(ortWahl);
  if(!keys.length){ ortModus = "liste"; zeichneOrt(); return; }
  var namen = keys.map(ortTitel).join(" · ");

  var h = '<div class="karte"><span class="lab">Diese Artikel</span>' +
    '<div class="o-namen">' + esc(namen) + '</div></div>';
  h += ortKarteSvg(ortZiel);
  i.innerHTML = h;

  var setzText = ortZiel ? ("Nach " + esc(ortZiel) + " setzen") : "Fach auf der Karte tippen";
  f.innerHTML =
    '<button class="b riesig gruen" id="o-setzen"' + (ortZiel ? "" : " disabled") + '>' + setzText + '</button>' +
    '<div class="reihe"><button class="b geist klein" id="o-zurueck">Zurück</button>' +
    '<button class="b geist klein" id="o-entfernen">Platz entfernen</button></div>';

  var box = i.querySelector(".karte-box");
  if(box) box.addEventListener("click", function(e){
    var g = e.target && e.target.closest ? e.target.closest("[data-fach]") : null;
    if(g){ ortZiel = g.getAttribute("data-fach"); ortKarteAnsicht(); }
  });
  $("#o-setzen").addEventListener("click", function(){
    if(!ortZiel) return;
    dialog(keys.length + " Artikel → " + ortZiel,
      '<div class="zielz">' + esc(ortZiel) + '</div><div class="o-namen">' + esc(namen) + '</div>',
      "Setzen", function(){
        ortSetzeFach(keys, ortZiel);
        zeigeToast(keys.length + " → " + ortZiel);
        ortWahl = {}; ortModus = "liste"; ortZiel = null; ortSuche = "";
        zeichneOrt();
      });
  });
  $("#o-zurueck").addEventListener("click", function(){ ortModus = "liste"; ortZiel = null; zeichneOrt(); });
  $("#o-entfernen").addEventListener("click", function(){
    dialog("Platz entfernen",

      "Entfernen", function(){
        ortSetzeFach(keys, null);
        zeigeToast("Platz entfernt");
        ortWahl = {}; ortModus = "liste"; ortZiel = null;
        zeichneOrt();
      });

}

function ortSetzeFach(keys, fach){
  keys.forEach(function(key){
    if(fach) PLAETZE[key] = fach; else delete PLAETZE[key];
    if(BESTAND[key]) BESTAND[key].fach = fach || null;
    fachZumServer({artikel:key, titel:ortTitel(key), fach:fach || null});
  });
  sichere(LS.plaetze, PLAETZE);
  sichere(LS.bestand, BESTAND);
  zeichneKopf();
}

/* Anwaehlbare Karte: gleiche Geometrie wie die Anzeige-Karte, aber jedes Fach
   ist eine Gruppe mit data-fach. Belegte Faecher sind eingefaerbt, das Ziel rot. */
function ortKarteSvg(ziel){
  var belegt = {};
  Object.keys(PLAETZE).forEach(function(k){ belegt[PLAETZE[k]] = (belegt[PLAETZE[k]] || 0) + 1; });
  var s = '<svg viewBox="2 44 316 322" style="width:100%;height:auto;display:block">';
  s += '<rect x="14" y="68" width="292" height="278" rx="8" fill="#faf9f7" stroke="#17161a" stroke-width="4"/>';
  s += '<rect x="42" y="63" width="52" height="10" fill="#faf9f7"/>';
  s += '<text x="68" y="58" text-anchor="middle" font-size="12" fill="#8a8891" font-weight="700">Eingang</text>';
  s += '<rect x="106" y="76" width="106" height="24" rx="4" fill="#17161a"/>';
  s += '<text x="159" y="92" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">Tisch</text>';
  s += '<rect x="20" y="78" width="32" height="226" rx="4" fill="#eceae7"/>';
  s += '<rect x="110" y="106" width="184" height="46" rx="4" fill="#eceae7"/>';
  s += '<rect x="110" y="106" width="20" height="46" rx="4" fill="#e3e0dc"/>';
  s += '<rect x="110" y="198" width="184" height="46" rx="4" fill="#eceae7"/>';
  s += '<rect x="110" y="198" width="20" height="46" rx="4" fill="#e3e0dc"/>';
  s += '<rect x="72" y="314" width="212" height="24" rx="4" fill="#eceae7"/>';
  s += '<text x="10" y="190" text-anchor="middle" font-size="10.5" fill="#6b6971" font-weight="700" transform="rotate(-90 10 190)">Regalwand 1</text>';
  s += '<text x="224" y="167" text-anchor="middle" font-size="10.5" fill="#6b6971" font-weight="700">Zwischengestell 1</text>';
  s += '<text x="224" y="259" text-anchor="middle" font-size="10.5" fill="#6b6971" font-weight="700">Zwischengestell 2</text>';
  s += '<text x="178" y="357" text-anchor="middle" font-size="10.5" fill="#6b6971" font-weight="700">Regalwand 2</text>';
  ALLE_FAECHER.forEach(function(f){
    var ist = f.c === ziel, an = (belegt[f.c] || 0) > 0;
    var fuell = ist ? "#a8271c" : (an ? "#f3e2df" : "#fff");
    var rand = ist ? "#a8271c" : (an ? zonenFarbe(f.c) : "#cfcdc9");
    s += '<g data-fach="' + f.c + '">';
    s += '<rect x="' + (f.x + 1) + '" y="' + (f.y + 1) + '" width="' + (f.w - 2) +
         '" height="' + (f.h - 2) + '" rx="2.5" fill="' + fuell +
         '" stroke="' + rand + '" stroke-width="' + (ist ? 3 : (an ? 1.6 : 1)) + '"' +
         (an || ist ? "" : ' stroke-dasharray="2 2"') + '/>';
    s += '<text x="' + (f.x + f.w / 2) + '" y="' + (f.y + f.h / 2 + 3) +
         '" text-anchor="middle" font-size="8.5" font-weight="' + (an || ist ? 800 : 400) +
         '" fill="' + (ist ? "#fff" : (an ? "#3a383f" : "#b3b0ac")) +
         '">' + f.c.split("-")[1] + '</text>';
    s += '</g>';
  });
  s += '</svg>';
  return '<div class="karte-box">' + s + '</div>';
}

/* ---- Bestellungen (Kommissionierung aus Shopify) ----
   Immer ansehbar, nie gesperrt. Zustaende: offen -> lauf (Timer) -> fertig -> versendet. */
var BESTELL = [];
var bestOffen = null;
var bestZustand = lade("sea.bestellzustand.v1", {});   // id -> {zustand,start,ende,dauer,picked}
var bestUhrTimer = null;
var HAKEN = '<svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" ' +
  'stroke-width="3.5" stroke-linecap="round"><path d="M4 12l6 6L20 6"/></svg>';

function fmtDauer(ms){
  var s = Math.max(0, Math.floor(ms / 1000)), m = Math.floor(s / 60);
  s = s % 60;
  return (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
}
function zuKlasse(z){ return z === "lauf" ? "zu-lauf" : z === "fertig" ? "zu-fertig" :
  z === "versendet" ? "zu-versendet" : "zu-offen"; }
function zuText(z){ return z === "lauf" ? "läuft" : z === "fertig" ? "gepackt" :
  z === "versendet" ? "versendet" : "offen"; }
function bestZ(id){ return bestZustand[id] || {zustand:"offen"}; }
function speicherZustand(){ sichere("sea.bestellzustand.v1", bestZustand); }

function ladeBestellungen(){
  var laden = $("#best-laden");
  if(laden) laden.textContent = "Lädt…";
  return fetch(SERVER + "/api/bestellungen", {headers:kopfZeilen()}).then(function(r){
    if(!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  }).then(function(d){
    BESTELL = d.bestellungen || [];
    VERBUNDEN = true; zeichneKopf();
    aktualisiereBadge();
    if($("#v-bestell").classList.contains("on")) zeichneBestell();
    return true;
  }).catch(function(e){
    console.log("ladeBestellungen FEHLER: " + (e && e.message ? e.message : e));
    if($("#v-bestell").classList.contains("on")) zeichneBestell();
    return false;
  });
}
function aktualisiereBadge(){
  var offen = BESTELL.filter(function(o){ return bestZ(o.id).zustand !== "versendet"; }).length;
  var b = $("#heim-best");
  if(b){ b.textContent = offen; b.style.display = offen ? "flex" : "none"; }
}

function zeichneBestell(){
  stopUhr();
  if(bestOffen){ bestellDetail(); return; }
  var i = $("#best-inhalt"), f = $("#best-fuss");
  $("#best-titel").textContent = "Bestellungen";
  $("#best-zahl").textContent = BESTELL.length ? BESTELL.length + " offen" : "";
  i.innerHTML = BESTELL.length ? BESTELL.map(function(o){
    var z = bestZ(o.id).zustand;
    var stk = o.positionen.reduce(function(s, p){ return s + p.menge; }, 0);
    var hol = o.positionen.some(function(p){ return p.holen; });
    return '<div class="best" data-id="' + esc(o.id) + '">' +
      '<div class="haupt"><div class="nr">' + esc(o.name) + '</div>' +
      '<div class="meta"><span>' + stk + ' Stück</span>' +
      (hol ? '<span style="color:var(--gelb)">Embrach nötig</span>' : "") +
      '<span class="best-zustand ' + zuKlasse(z) + '">' + zuText(z) + '</span></div></div>' +
      '<span class="stk">' + o.positionen.length + '</span></div>';
  }).join("") : '<div class="leerstelle">Keine offenen Bestellungen geladen.<br>Auf Aktualisieren tippen.</div>';
  f.innerHTML = '<button class="b riesig akz" id="best-laden">Aktualisieren</button>';
  i.querySelectorAll("[data-id]").forEach(function(el){
    el.addEventListener("click", function(){ bestOeffnenId(el.getAttribute("data-id")); });
  });
  $("#best-laden").addEventListener("click", ladeBestellungen);
}
function bestOeffnenId(id){
  bestOffen = BESTELL.filter(function(o){ return String(o.id) === String(id); })[0] || null;
  zeichneBestell();
}

function bestellDetail(){
  var o = bestOffen, i = $("#best-inhalt"), f = $("#best-fuss");
  var zs = bestZ(o.id), z = zs.zustand;
  $("#best-titel").textContent = o.name;
  $("#best-zahl").textContent = "";
  var h = "";
  if(z === "lauf" && zs.start){
    h += '<div class="karte"><div class="timer" id="best-uhr">' + fmtDauer(Date.now() - zs.start) + '</div>' +
      '<div style="text-align:center;color:var(--grau);font-size:12px">läuft</div></div>';
  } else if((z === "fertig" || z === "versendet") && zs.dauer){
    h += '<div class="karte"><div class="timer">' + fmtDauer(zs.dauer) + '</div>' +
      '<div style="text-align:center;color:var(--grau);font-size:12px">Packzeit</div></div>';
  }
  var picked = zs.picked || {};
  h += '<div class="karte">' + o.positionen.map(function(p, n){
    var burl = p.bild || bildFuer(p.titel);
    return '<div class="pos' + (p.holen ? " pos-emb" : "") + (picked[n] ? " fertig" : "") + '" data-pos="' + n + '">' +
      '<span class="haken">' + (picked[n] ? HAKEN : "") + '</span>' +
      (burl ? '<img class="pbild" src="' + esc(bildUrl(burl, 120)) + '" data-gross="' +
        esc(bildUrl(burl, 1200)) + '" onerror="seaBildFehler(this)">' : "") +
      '<span class="haupt"><span class="pname">' + esc(p.titel) + '</span>' +
      '<span class="pmeta"><span class="pgr">' + esc(p.groesse) + '</span>' +
      '<span class="code">' + esc(p.fach || "—") + '</span>' +
      (p.holen ? '<span class="warnpunkt">!</span><span style="color:var(--gelb)">aus Embrach</span>'
               : '<span>ZH ' + p.zh + '</span>') +
      '</span></span><span class="pmenge">' + p.menge + '</span></div>';
  }).join("") + '</div>';
  var faecher = o.positionen.map(function(p){ return p.fach; }).filter(Boolean);
  if(faecher.length) h += bestellKarte(faecher);
  i.innerHTML = h;

  if(z === "offen"){
    f.innerHTML = '<button class="b riesig akz" id="best-start">Bestellung starten</button>';
    $("#best-start").addEventListener("click", bestStart);
  } else if(z === "lauf"){
    f.innerHTML = '<button class="b riesig gruen" id="best-fertig">Bestellung fertig</button>' +
      '<button class="b geist klein" id="best-ab">Abbrechen (Timer verwerfen)</button>';
    $("#best-fertig").addEventListener("click", bestFertig);
    $("#best-ab").addEventListener("click", function(){
      delete bestZustand[bestOffen.id]; speicherZustand(); stopUhr(); zeichneBestell();
    });
  } else if(z === "fertig"){
    f.innerHTML = '<button class="b riesig akz" id="best-send">In Shopify als versendet</button>';
    $("#best-send").addEventListener("click", bestVersenden);
  } else {
    f.innerHTML = '<div class="leerstelle">In Shopify als versendet markiert.</div>';
  }

  i.querySelectorAll("[data-pos]").forEach(function(el){
    el.addEventListener("click", function(){ bestPick(parseInt(el.getAttribute("data-pos"), 10)); });
  });
  i.querySelectorAll(".pos .pbild").forEach(function(im){
    im.addEventListener("click", function(e){ e.stopPropagation(); oeffneLightbox(im.getAttribute("data-gross")); });
  });
  if(z === "lauf" && zs.start) starteUhr(zs.start);
}

function bestStart(){
  bestZustand[bestOffen.id] = {zustand:"lauf", start:Date.now(), picked:{}};
  speicherZustand();
  zeichneBestell();
}
function bestPick(n){
  var zs = bestZustand[bestOffen.id]; if(!zs) return;
  zs.picked = zs.picked || {};
  zs.picked[n] = !zs.picked[n];
  speicherZustand();
  bestellDetail();
}
function bestFertig(){
  var zs = bestZustand[bestOffen.id]; if(!zs) return;
  zs.ende = Date.now();
  zs.dauer = zs.ende - (zs.start || zs.ende);
  zs.zustand = "fertig";
  speicherZustand();
  stopUhr();
  fetch(SERVER + "/api/kommission", {method:"POST", headers:kopfZeilen(), body:JSON.stringify({
    order:String(bestOffen.id), name:bestOffen.name, start:zs.start, ende:zs.ende,
    dauer:zs.dauer, positionen:bestOffen.positionen.length,
    stueck:bestOffen.positionen.reduce(function(s, p){ return s + p.menge; }, 0)
  })}).catch(function(e){ console.log("kommission FEHLER: " + (e && e.message ? e.message : e)); });
  zeigeToast("Fertig in " + fmtDauer(zs.dauer));
  zeichneBestell();
}
function bestVersenden(){
  var o = bestOffen;
  dialog("In Shopify versenden",
    '<div class="o-namen">' + esc(o.name) + ' wird in Shopify als versendet markiert.</div>',
    "Versenden", function(){
      fetch(SERVER + "/api/fulfill", {method:"POST", headers:kopfZeilen(), body:JSON.stringify({order:String(o.id)})})
        .then(function(r){ return r.json(); })
        .then(function(d){
          if(d.ok){
            (bestZustand[o.id] = bestZustand[o.id] || {}).zustand = "versendet";
            speicherZustand(); aktualisiereBadge();
            zeigeToast("In Shopify versendet");
          } else {
            zeigeToast(d.fehler === "scope" ? "Shopify-Berechtigung fehlt" : "Versand fehlgeschlagen");
          }
          zeichneBestell();
        })
        .catch(function(e){ console.log("fulfill FEHLER: " + (e && e.message ? e.message : e)); zeigeToast("Kein Netz"); });
    });
}

function starteUhr(start){
  stopUhr();
  bestUhrTimer = setInterval(function(){
    var el = $("#best-uhr"); if(!el){ stopUhr(); return; }
    el.textContent = fmtDauer(Date.now() - start);
  }, 1000);
}
function stopUhr(){ if(bestUhrTimer){ clearInterval(bestUhrTimer); bestUhrTimer = null; } }

/* Karte mit allen Faechern einer Bestellung markiert (Zuerich, Lagerraum 1). */
function bestellKarte(faecher){
  var set = {}; faecher.forEach(function(c){ set[c] = 1; });
  var s = '<svg viewBox="2 44 316 322" style="width:100%;height:auto;display:block">';
  s += '<rect x="14" y="68" width="292" height="278" rx="8" fill="#faf9f7" stroke="#17161a" stroke-width="4"/>';
  s += '<rect x="106" y="76" width="106" height="24" rx="4" fill="#17161a"/>';
  s += '<text x="159" y="92" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">Tisch</text>';
  s += '<rect x="20" y="78" width="32" height="226" rx="4" fill="#eceae7"/>';
  s += '<rect x="110" y="106" width="184" height="46" rx="4" fill="#eceae7"/>';
  s += '<rect x="110" y="198" width="184" height="46" rx="4" fill="#eceae7"/>';
  s += '<rect x="72" y="314" width="212" height="24" rx="4" fill="#eceae7"/>';
  ALLE_FAECHER.forEach(function(f){
    var ist = set[f.c] === 1;
    s += '<rect x="' + (f.x + 1) + '" y="' + (f.y + 1) + '" width="' + (f.w - 2) +
         '" height="' + (f.h - 2) + '" rx="2.5" fill="' + (ist ? "#a8271c" : "#fff") +
         '" stroke="' + (ist ? "#a8271c" : "#cfcdc9") + '" stroke-width="' + (ist ? 2.5 : 1) + '"' +
         (ist ? "" : ' stroke-dasharray="2 2"') + '/>';
    s += '<text x="' + (f.x + f.w / 2) + '" y="' + (f.y + f.h / 2 + 3) +
         '" text-anchor="middle" font-size="8.5" font-weight="' + (ist ? 800 : 400) +
         '" fill="' + (ist ? "#fff" : "#b3b0ac") + '">' + f.c.split("-")[1] + '</text>';
  });
  s += '</svg>';
  return '<div class="karte-box">' + s + '</div>';
}

/* Kamera */
var stream = null, laeuft = false, detector = null, frist = 0, scanZiel = "artikel";
var SCAN_FRIST = 12000;

async function kameraStarten(ziel){
  scanZiel = ziel || "artikel";
  if(laeuft){ kameraStoppen(); return; }
  if(!("BarcodeDetector" in window)){ zeigeToast("Kein Barcode-Leser"); return; }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){ zeigeToast("Keine Kamera"); return; }
  try{
    var formate = await window.BarcodeDetector.getSupportedFormats();
    var wunsch = ["ean_13","ean_8","upc_a","upc_e","code_128"].filter(function(f){
      return formate.indexOf(f) >= 0;
    });
    detector = new window.BarcodeDetector({formats: wunsch.length ? wunsch : formate});
    stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:"environment"}, width:{ideal:1280}, height:{ideal:720}}
    });
    var video = $("#video");
    video.srcObject = stream;
    await video.play();
    $("#buehne").classList.add("an");
    laeuft = true;
    clearTimeout(frist);
    frist = setTimeout(function(){ kameraStoppen(); }, SCAN_FRIST);
    suchen();
  }catch(e){
    zeigeToast(e && e.name === "NotAllowedError" ? "Kamera nicht erlaubt" : "Kamera nicht bereit");
  }
}
function kameraStoppen(){
  laeuft = false;
  clearTimeout(frist);
  if(stream){ stream.getTracks().forEach(function(t){ t.stop(); }); stream = null; }
  $("#video").srcObject = null;
  $("#buehne").classList.remove("an");
}
async function suchen(){
  if(!laeuft) return;
  var video = $("#video");
  if(video.readyState === 4){
    try{
      var codes = await detector.detect(video);
      if(codes && codes.length){
        var wert = String(codes[0].rawValue || "").trim();
        if(wert){
          if(navigator.vibrate) navigator.vibrate(45);
          kameraStoppen();
          if(scanZiel === "eingang") eingangStart(wert); else zeigeArtikel(wert);
          return;
        }
      }
    }catch(e){}
  }
  requestAnimationFrame(suchen);
}

function zeichneKopf(){

  if(VERBUNDEN === false){
    p.textContent = WARTE.length ? "offline " + WARTE.length : "offline";

  } else if(VERBUNDEN === true){
    var n = 0;
    Object.keys(BESTAND).forEach(function(k){
      Object.keys(BESTAND[k].g).forEach(function(g){
        n += (BESTAND[k].g[g].zh || 0) + (BESTAND[k].g[g].emb || 0);
      });
    });
    p.textContent = n + " Stk";
    p.className = "pill ok";
  } else {
    p.textContent = String(KATALOG.length);
    p.className = "pill " + (KATALOG.length ? "ok" : "warn");
  }
}
