<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Finelli Cockpit — Vorschau</title>
<style>
/* Finelli Cockpit — Vorschau (Simulation, Übungs-Modus, Beispieldaten).
   Zweck: Demo einer fast fertigen Lager-App für Khawar am Vor-Ort-Termin.
   VERBOTEN: Preise/Geld, Endkunden-Daten, Auto-Buchung durch KI, Charts,
   Eszett, Zufallszahlen zur Laufzeit. Alle Zahlen live aus ART/S. */
*{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#17161a;--bg:#f4f4f2;--red:#a8271c;--g:#2f7d43;--y:#b9861a;--gb:#e7f0e9;--yb:#f5ecd9;--rb:#f7e5e2;--line:#e5e3df}
html,body{background:var(--bg);color:var(--ink);font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%;overflow-x:hidden}
body{min-height:100vh}
.serif{font-family:Georgia,"Times New Roman",serif}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font:inherit}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--red);margin-left:3px;vertical-align:middle}
/* topbar */
.top{position:sticky;top:0;z-index:30;background:var(--ink);color:#fff;display:flex;align-items:center;gap:10px;padding:10px 14px}
.top .wm{font-size:20px;font-weight:700;letter-spacing:.5px}
.top .sub{font-size:11px;color:#b7b4bd}
.top .sp{flex:1}
.badge{border:1px solid var(--red);background:#2a1a18;color:#f0c9c3;font-size:11px;padding:3px 8px;border-radius:20px;white-space:nowrap}
.top .dt{font-size:12px;color:#cfccd4}
@media(max-width:620px){.top .sub{display:none}.top .dtl{display:none}}
@media(min-width:621px){.top .dts{display:none}}
/* layout */
.shell{display:flex}
.side{display:none}
main{flex:1;padding:16px 16px 96px;max-width:820px;margin:0 auto;width:100%}
.view{display:none;animation:fade .18s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
h1{font-size:23px;margin-bottom:2px;font-family:Georgia,"Times New Roman",serif}
.hd{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.hd .badge{border-color:var(--red);background:#fff;color:var(--red)}
.hd .dt{font-size:12px;color:#77747c;margin-left:auto}
.subttl{color:#77747c;font-size:13px;margin:-8px 0 12px}
/* cards */
.c{background:#fff;border:1px solid var(--line);border-radius:15px;padding:15px;margin-bottom:12px}
.c h2{font-size:15px;margin-bottom:10px}
.ct{font-size:13px;color:#55535a;line-height:1.5}
.mut{color:#8a8891;font-size:12px}
.b{background:var(--red);color:#fff;border-radius:10px;padding:11px 15px;font-size:14px;font-weight:600;min-height:44px;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.b.gh{background:#efedea;color:var(--ink)}
.b:disabled{opacity:.5;cursor:default}
.b.full{width:100%}
.row{display:flex;gap:9px;flex-wrap:wrap}
/* ampel chip */
.chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:4px 9px;border-radius:20px;min-height:26px}
.chip.g{background:var(--gb);color:var(--g)}
.chip.y{background:var(--yb);color:var(--y)}
.chip.r{background:var(--rb);color:var(--red)}
/* ampel row */
.amp3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px}
.amp3 .ac{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 10px;text-align:center}
.amp3 .ac .n{font-size:26px;font-weight:800;line-height:1}
.amp3 .ac .l{font-size:11px;color:#66646c;margin-top:4px}
.ac.g{border-top:4px solid var(--g)}.ac.y{border-top:4px solid var(--y)}.ac.r{border-top:4px solid var(--red)}
.ac.g .n{color:var(--g)}.ac.y .n{color:var(--y)}.ac.r .n{color:var(--red)}
/* heute */
.big{font-size:30px;font-weight:800;line-height:1.05}
.klbl{font-size:12px;color:#66646c}
.grid2{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:520px){.grid2{grid-template-columns:1fr;gap:6px}.grid2>div{display:flex;align-items:baseline;gap:8px}}
.kicard{border-left:4px solid var(--red)}
/* list */
.li{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:13px;margin-bottom:9px;width:100%;text-align:left}
.li .nm{font-weight:600;font-size:14px}
.li .mt{font-size:12px;color:#77747c}
.li .cv{margin-left:auto;color:#aaa}
.filterchip{display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:#fff;font-size:12px;padding:6px 8px 6px 12px;border-radius:20px;margin-bottom:10px}
.filterchip button{background:rgba(255,255,255,.2);width:22px;height:22px;border-radius:50%;color:#fff;font-size:14px}
.inp{width:100%;padding:11px 12px;border:1px solid #d8d6d2;border-radius:10px;background:#fff;min-height:44px}
/* matrix */
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:10px 0}
table.mx{border-collapse:collapse;width:100%;min-width:280px}
.mx th,.mx td{border:1px solid var(--line);padding:9px;text-align:center;font-size:13px}
.mx th{background:#faf9f7;font-size:12px}
.mx td .q{font-size:19px;font-weight:800}
.mx td.g{background:var(--gb)}.mx td.y{background:var(--yb)}.mx td.r{background:var(--rb)}
.back{display:inline-flex;align-items:center;gap:6px;color:#55535a;font-size:14px;margin-bottom:8px;min-height:44px}
.banner{border:1px solid var(--y);background:var(--yb);border-radius:11px;padding:12px;font-size:13px;color:#7a5c12;margin:10px 0;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.banner.rr{border-color:var(--red);background:var(--rb);color:#7a1c14}
.plc{font-size:12px;color:#55535a;margin:2px 0}
/* orders */
.steps{display:flex;gap:4px;margin:10px 0}
.step{flex:1;text-align:center}
.step .d{width:16px;height:16px;border-radius:50%;background:#e2e0dc;margin:0 auto 4px;border:2px solid #e2e0dc}
.step.done .d{background:var(--g);border-color:var(--g)}
.step.cur .d{background:#fff;border-color:var(--red);box-shadow:0 0 0 3px var(--rb)}
.step .t{font-size:9.5px;color:#77747c;line-height:1.15}
.pz{border-top:1px solid var(--line);margin-top:10px;padding-top:10px}
.pztog{display:flex;align-items:center;gap:8px;width:100%;font-size:13px;font-weight:600;min-height:40px}
.neu{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px}
.pzbody{max-height:0;overflow:hidden;transition:max-height .22s ease}
.pzbody.open{max-height:360px}
.pzline{font-size:12.5px;color:#44424a;padding:5px 0;border-bottom:1px dashed var(--line)}
.ochip{background:#f0eeeb;font-size:12px;padding:3px 9px;border-radius:20px;font-weight:600}
/* scan */
.sw{display:flex;align-items:center;gap:10px;font-size:13px}
.tgl{width:46px;height:26px;border-radius:20px;background:#cfcdca;position:relative;transition:.15s;flex:none}
.tgl.on{background:var(--red)}
.tgl b{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.15s}
.tgl.on b{left:23px}
.scanbtn{width:100%;padding:22px;font-size:17px;border-radius:14px}
.scanbtn.pulse{animation:pl .5s ease}
@keyframes pl{0%{transform:scale(1)}50%{transform:scale(.96)}100%{transform:scale(1)}}
.ok{color:var(--g);font-weight:700}
.qcard{border:1px solid var(--y);background:var(--yb);border-radius:12px;padding:12px;margin-top:12px}
/* Lagerraum-Karte + Groessen-Farben */
.kartew{display:flex;justify-content:center;margin-top:10px}
.kartew svg{width:225px;max-width:100%;height:auto}
.puls{animation:puls 1.6s ease-out infinite;transform-origin:center;transform-box:fill-box}
@keyframes puls{0%{opacity:.65;transform:scale(.5)}70%{opacity:0;transform:scale(2)}100%{opacity:0}}
.szd{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px}
.szchip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:3px 9px;border:1px solid var(--line);border-radius:20px;background:#fff;margin:2px 3px 2px 0}
.szchip i{display:inline-block;width:10px;height:10px;border-radius:50%}
.szchip.akt{border-color:var(--ink)}
.fachfront{display:flex;gap:5px;margin-top:8px}
.ff{flex:1;color:#fff;text-align:center;font-size:12px;font-weight:700;padding:11px 0;border-radius:7px;opacity:.3}
.ff.akt{opacity:1;outline:3px solid var(--ink)}
/* chat */
.bubw{display:flex;flex-direction:column;gap:9px;margin:10px 0;min-height:60px}
.bub{max-width:85%;padding:10px 13px;border-radius:14px;font-size:13.5px;line-height:1.5;animation:fade .3s}
.bub.u{align-self:flex-end;background:var(--ink);color:#fff;border-bottom-right-radius:4px}
.bub.f{align-self:flex-start;background:#fff;border:1px solid var(--line);border-bottom-left-radius:4px}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0}
.qchip{border:1px solid #d8d6d2;background:#fff;border-radius:20px;padding:8px 12px;font-size:12.5px;min-height:40px}
.cbar{display:flex;gap:8px;margin-top:8px}
/* report */
.zw{font-size:64px;font-weight:800;color:var(--red);line-height:1}
/* locked */
.lockw{text-align:center;padding:20px 10px}
.lockw svg{width:56px;height:56px;color:#9a979f;margin-bottom:10px}
/* login */
#v-login{position:fixed;inset:0;background:var(--ink);z-index:60;display:none;align-items:center;justify-content:center;padding:20px}
#v-login.on{display:flex}
.lcard{background:#fff;border-radius:18px;padding:26px 22px;width:100%;max-width:330px;text-align:center}
.lcard.shake{animation:sh .3s}
@keyframes sh{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.pins{display:flex;gap:14px;justify-content:center;margin:18px 0}
.pins i{width:15px;height:15px;border-radius:50%;border:2px solid #cdcbc8;background:transparent}
.pins i.f{background:var(--ink);border-color:var(--ink)}
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.pad button{background:#f2f0ed;border-radius:12px;font-size:20px;font-weight:600;min-height:56px}
.pad button:active{background:#e4e2de}
.hint{background:var(--yb);color:#7a5c12;font-size:13px;padding:8px;border-radius:9px;margin:14px 0 6px}
.err{color:var(--red);font-size:13px;font-weight:600;min-height:18px}
/* toast */
#toast{position:fixed;left:50%;transform:translateX(-50%) translateY(20px);bottom:84px;background:var(--ink);color:#fff;padding:12px 18px;border-radius:12px;font-size:13px;max-width:90%;text-align:center;opacity:0;pointer-events:none;transition:.2s;z-index:80;border:1px solid #2b2930}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:900px){#toast{bottom:24px}}
/* modal */
#ov{position:fixed;inset:0;background:rgba(20,18,22,.5);z-index:70;display:none;align-items:flex-end;justify-content:center}
#ov.on{display:flex}
.mcard{background:#fff;border-radius:16px 16px 0 0;padding:18px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;animation:up .2s ease}
@media(min-width:620px){#ov{align-items:center}.mcard{border-radius:16px}}
@keyframes up{from{transform:translateY(30px)}to{transform:translateY(0)}}
.mcard h3{font-size:16px;margin-bottom:12px}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:12px;color:#66646c;margin-bottom:5px;font-weight:600}
.step-in{display:flex;align-items:center;gap:10px}
.step-in button{width:44px;height:44px;border-radius:10px;background:#efedea;font-size:22px;font-weight:600}
.step-in .v{font-size:20px;font-weight:700;min-width:36px;text-align:center}
.inline-err{color:var(--red);font-size:12px;font-weight:600;margin-top:4px;display:none}
.inline-err.on{display:block}
/* bottom nav */
.bn{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--ink);display:flex;padding-bottom:env(safe-area-inset-bottom)}
.bn button{flex:1;min-height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:#9a97a0;font-size:10px}
.bn button svg{width:22px;height:22px}
.bn button.act{color:#fff}
.bn button.act svg{color:var(--red)}
/* sheet */
#sheet{position:fixed;inset:0;z-index:75;display:none}
#sheet.on{display:block}
#sheet .sov{position:absolute;inset:0;background:rgba(20,18,22,.5)}
#sheet .sp{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:16px 16px 0 0;padding:10px 14px 20px;transform:translateY(100%);transition:transform .2s ease;padding-bottom:calc(20px + env(safe-area-inset-bottom))}
#sheet.on .sp{transform:translateY(0)}
#sheet .sh{display:flex;align-items:center;gap:12px;width:100%;padding:14px 6px;font-size:15px;border-bottom:1px solid var(--line);min-height:52px}
#sheet .sh svg{width:20px;height:20px;color:#55535a}
#sheet .sh.rd{color:var(--red)}
#sheet .info{font-size:11.5px;color:#8a8891;line-height:1.5;padding:12px 6px 4px}
.lockbadge{margin-left:auto;font-size:11px;color:#9a979f}
/* desktop */
@media(min-width:900px){
  .bn{display:none}
  main{padding-bottom:24px}
  .side{display:flex;flex-direction:column;width:230px;min-height:calc(100vh - 45px);background:var(--ink);position:sticky;top:45px;color:#fff;flex:none}
  .side .nv{flex:1;padding:12px 0}
  .side .nv button{display:flex;align-items:center;gap:11px;width:100%;padding:12px 18px;color:#b7b4bd;font-size:14px;position:relative;min-height:46px}
  .side .nv button svg{width:19px;height:19px}
  .side .nv button.act{color:#fff;background:#242229}
  .side .nv button.act::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--red)}
  .side .fz{font-size:11px;color:#7d7a84;line-height:1.5;padding:14px 18px;border-top:1px solid #2b2930}
  .side .nv .lockbadge{margin-left:auto}
}
</style>
</head>
<body>
<noscript>Diese Vorschau braucht JavaScript.</noscript>

<header class="top" id="topbar">
  <span class="wm serif">FINELLI<span class="dot"></span></span>
  <span class="sub">Cockpit — Vorschau</span>
  <span class="sp"></span>
  <span class="badge">Übungs-Modus — Beispieldaten</span>
  <span class="dt dtl" id="dtL"></span>
  <span class="dt dts" id="dtS"></span>
</header>

<div class="shell">
  <nav class="side" role="navigation" id="sidebar"></nav>
  <main id="main">
    <section class="view" data-view="home" id="v-home"></section>
    <section class="view" data-view="stock" id="v-stock"></section>
    <section class="view" data-view="orders" id="v-orders"></section>
    <section class="view" data-view="scan" id="v-scan"></section>
    <section class="view" data-view="chat" id="v-chat"></section>
    <section class="view" data-view="report" id="v-report"></section>
    <section class="view" data-view="locked" id="v-locked"></section>
  </main>
</div>

<section class="view" data-view="login" id="v-login">
  <div class="lcard" id="lcard">
    <div class="wm serif" style="font-size:34px;font-weight:700">FINELLI<span class="dot" style="width:12px;height:12px"></span></div>
    <div class="mut" style="margin-top:4px">Cockpit — Vorschau</div>
    <div class="pins" id="pins"><i></i><i></i><i></i><i></i></div>
    <input id="pin" name="pin" inputmode="numeric" maxlength="4" style="position:absolute;left:-9999px" aria-label="PIN">
    <div class="pad" id="pad"></div>
    <div class="hint">Demo-PIN: 2019</div>
    <div class="err" id="perr"></div>
    <div class="mut" style="margin-top:6px">PIN pro Mitarbeiter — jeder Klick ist zuordenbar.</div>
  </div>
</section>

<nav class="bn" role="tablist" id="bnav"></nav>

<div id="sheet"><div class="sov" onclick="closeSheet()"></div><div class="sp" id="sheetp"></div></div>
<div id="ov" onclick="if(event.target.id=='ov')closeModal()"><div class="mcard" id="mcard"></div></div>
<div id="toast"></div>

<script>
/* ===== Kalendertag (zeitzonenfest) ===== */
const DOY=(()=>{const n=new Date();return Math.floor((Date.UTC(n.getFullYear(),n.getMonth(),n.getDate())-Date.UTC(n.getFullYear(),0,1))/864e5)+1;})();
const K={verkHeute:9+DOY%7,bestellAnz:3+DOY%3,wochenSumme:80+DOY%9,ordNr:i=>7400+((DOY*7)%400)+i};
const LOC={zh:'Zürich City',emb:'Embrach'};
const ART=[
 {id:'a1',name:'Hoodie Classic',   sizes:['S','M','L','XL'], pl:{zh:'ZH-A-01',emb:'EMB-B-03'}, q:{zh:[8,0,6,3],  emb:[12,4,9,7]}},
 {id:'a2',name:'Tee Box-Logo',     sizes:['S','M','L','XL'], pl:{zh:'ZH-A-02',emb:'EMB-B-01'}, q:{zh:[14,11,9,6],emb:[20,16,12,8]}},
 {id:'a3',name:'Cap Sport',        sizes:['One Size'],       pl:{zh:'ZH-C-04',emb:'EMB-C-02'}, q:{zh:[3],        emb:[15]}},
 {id:'a4',name:'Jacke Coach',      sizes:['S','M','L','XL'], pl:{zh:'ZH-B-02',emb:'EMB-A-04'}, q:{zh:[5,6,3,0],  emb:[7,9,5,6]}},
 {id:'a5',name:'Beanie Logo',      sizes:['One Size'],       pl:{zh:'ZH-C-01',emb:'EMB-C-05'}, q:{zh:[2],        emb:[6]}},
 {id:'a6',name:'Cargo Pant',       sizes:['S','M','L','XL'], pl:{zh:'ZH-B-03',emb:'EMB-A-02'}, q:{zh:[5,4,6,5],  emb:[7,8,9,6]}},
 {id:'a7',name:'Longsleeve Script',sizes:['S','M','L','XL'], pl:{zh:'ZH-A-03',emb:'EMB-B-02'}, q:{zh:[9,7,8,6],  emb:[11,10,9,8]}},
 {id:'a8',name:'Socken 2er-Pack',  sizes:['39-42','43-46'],  pl:{zh:'ZH-C-02',emb:'EMB-C-01'}, q:{zh:[18,15],    emb:[25,22]}}
];
const ORD_TPL=[
 {items:[['a1','L',1],['a5','One Size',1]], ziel:'Zürich'},
 {items:[['a2','M',2]],                     ziel:'Basel'},
 {items:[['a6','M',1],['a8','39-42',1]],    ziel:'Winterthur'},
 {items:[['a7','L',1]],                     ziel:'Luzern'},
 {items:[['a3','One Size',1],['a2','S',2]], ziel:'Bern'}
];
const SCAN=[{art:'a2',size:'M',loc:'emb'},{art:'a1',size:'M',loc:'emb'},{art:'a5',size:'One Size',loc:'emb'}];
/* Groessen-Farben: im Schrank zeigt die Farbe, wo die Groesse liegt */
const SZFARBE={'S':'#2F7D43','M':'#A8271C','L':'#B9861A','XL':'#1F3A5F','One Size':'#77747C','39-42':'#2F7D43','43-46':'#1F3A5F'};
const szf=s=>SZFARBE[s]||'#77747C';
const KI={art:'a1',size:'M',menge:12,text:()=>`Hoodie Classic M ist in Zürich City leer (0) und in Embrach nur ${liveMenge('a1','M','emb')}x — Vorschlag: 12 nachbestellen.`};
const S={view:'login',detail:null,scanCount:0,scanBusy:false,offline:false,queue:[],orders:[],ki:'offen',journal:[],eingebucht:0,filter:null,chatlog:[]};
ORD_TPL.slice(0,K.bestellAnz).forEach((t,i)=>S.orders.push({tpl:i,nr:K.ordNr(i),status:2,open:false}));

/* ===== Helfer ===== */
const $=id=>document.getElementById(id);
const getA=id=>ART.find(a=>a.id===id);
const si=(a,sz)=>a.sizes.indexOf(sz);
function liveMenge(id,sz,loc){const a=getA(id);return a.q[loc][si(a,sz)];}
function cellAmp(q){return q===0?'r':q<5?'y':'g';}
function ampOf(a){let m=Infinity;for(const l of['zh','emb'])a.q[l].forEach(v=>{if(v<m)m=v;});return cellAmp(m);}
function totalA(a){let s=0;for(const l of['zh','emb'])a.q[l].forEach(v=>s+=v);return s;}
function plText(code){const p=code.split('-');return 'Regal '+p[1]+', Fach '+parseInt(p[2]);}
function ampLbl(x){return x==='g'?'Alles gut':x==='y'?'Knapp':'Leer';}
function nowHM(){const n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
function counts(){const c={g:0,y:0,r:0};ART.forEach(a=>c[ampOf(a)]++);return c;}
function esc(s){return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}

/* ===== Mutation zentral ===== */
function act(txt,mut){mut&&mut();S.journal.unshift({t:nowHM(),txt:txt+' — PIN 2019'});renderAll();}

/* ===== Icons ===== */
const IC={

/* ===== Routing ===== */
function go(id){
 closeSheet();closeModal();
 if(id!=='login'&&sessionStorage.finPin!=='1'){id='login';}
 S.view=id;
 document.querySelectorAll('.view').forEach(v=>v.classList.toggle('on',v.dataset.view===id));
 $('topbar').style.display=id==='login'?'none':'';
 window.scrollTo(0,0);
 buildNav();renderAll();
}
function logout(){sessionStorage.clear();S.detail=null;go('login');resetPin();}

/* ===== Toast ===== */
let toastT;
function toast(t){const el=$('toast');el.textContent=t;el.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('on'),2600);}

/* ===== Modal ===== */
function openModal(html){$('mcard').innerHTML=html;$('ov').classList.add('on');}
function closeModal(){$('ov').classList.remove('on');}

/* ===== Login ===== */
function resetPin(){$('pin').value='';drawPins();$('perr').textContent='';}
function drawPins(){const n=$('pin').value.length;[...$('pins').children].forEach((d,i)=>d.classList.toggle('f',i<n));}
function pinPush(d){const p=$('pin');if(p.value.length>=4)return;p.value+=d;drawPins();if(p.value.length===4)checkPin();}
function pinDel(){const p=$('pin');p.value=p.value.slice(0,-1);drawPins();$('perr').textContent='';}
function checkPin(){
 if($('pin').value==='2019'){sessionStorage.finPin='1';go('home');toast('Willkommen, Khawar');}
 else{const c=$('lcard');c.classList.add('shake');setTimeout(()=>c.classList.remove('shake'),320);$('pin').value='';drawPins();$('perr').textContent='PIN stimmt nicht — probier 2019.';}
}
function buildPad(){
 let h='';[1,2,3,4,5,6,7,8,9].forEach(n=>h+=`<button type="button" onclick="pinPush('${n}')">${n}</button>`);
 h+='<button type="button" onclick="pinDel()">&#9003;</button><button type="button" onclick="pinPush(\'0\')">0</button><span></span>';
 $('pad').innerHTML=h;
 $('pin').addEventListener('input',e=>{e.target.value=e.target.value.replace(/\D/g,'').slice(0,4);drawPins();if(e.target.value.length===4)checkPin();});
}

/* ---- Umlagern-Modal ---- */
function umlagernModal(id,presz){
 const a=getA(id);const sz=presz||a.sizes[0];
 openModal(`<h3>Umlagern — ${a.name}</h3>
  <div class="fld"><label for="usz">Grösse</label><select class="inp" name="usz" id="usz" onchange="umStep(0)">${a.sizes.map(s=>`<option ${s===sz?'selected':''}>${s}</option>`).join('')}</select></div>
  <div class="fld"><label for="udir">Richtung</label><select class="inp" name="udir" id="udir" onchange="umStep(0)"><option value="emb">Embrach -&gt; Zürich City</option><option value="zh">Zürich City -&gt; Embrach</option></select></div>
  <div class="fld"><label>Menge</label><div class="step-in"><button type="button" onclick="umStep(-1)">&minus;</button><span class="v" id="uv">1</span><button type="button" onclick="umStep(1)">+</button></div><div class="inline-err" id="uerr"></div></div>
  <div class="row"><button class="b full" id="ubtn" onclick="umDo('${id}')">Umlagerung bestätigen</button></div>`);
 window._um={id,val:1};umStep(0);
}
function umMax(id){const a=getA(id);const src=$('udir').value;return a.q[src][si(a,$('usz').value)];}
function umStep(d){const m=umMax(window._um.id);let v=window._um.val+d;if(v<1)v=1;if(v>m)v=m;if(m===0)v=0;window._um.val=v;$('uv').textContent=v;
 const err=$('uerr'),btn=$('ubtn');
 if(m===0){err.textContent='Am Quell-Standort nichts verfügbar';err.classList.add('on');btn.disabled=true;}
 else{err.classList.remove('on');btn.disabled=false;}
}
function umDo(id){
 const a=getA(id),sz=$('usz').value,src=$('udir').value,dst=src==='emb'?'zh':'emb',v=window._um.val;const i=si(a,sz);
 if(v<1||v>a.q[src][i])return;
 closeModal();
 act(`Umlagerung: ${v}x ${a.name} ${sz} ${LOC[src]} -> ${LOC[dst]}`,()=>{a.q[src][i]-=v;a.q[dst][i]+=v;});
 toast('Umlagerung notiert — dein Team bringt es rüber, das System führt Buch.');
}

/* ---- Lagerraum-Karte (Embrach, 3 x 5 m, Ansicht von oben) ---- */
function lagerkarte(code,dotFarbe){
 const teile=code.split('-'),regal=teile[1],nr=parseInt(teile[2]);
 const R={A:{x:8,y:48,b:44,h:404,dir:'v'},B:{x:248,y:48,b:44,h:404,dir:'v'},C:{x:60,y:8,b:180,h:44,dir:'h'}};
 let s='<svg viewBox="0 0 300 500" role="img" aria-label="Lagerraum Embrach von oben, 3 mal 5 Meter">';
 s+='<rect x="3" y="3" width="294" height="494" rx="8" fill="#fff" stroke="#17161A" stroke-width="5"/>';
 s+='<rect x="115" y="491" width="70" height="9" fill="#F4F4F2"/>';
 s+='<text x="150" y="481" text-anchor="middle" font-size="13" fill="#77747C">Tür</text>';
 let dot=null;
 for(const rg of Object.keys(R)){
  const r=R[rg];
  s+=`<rect x="${r.x}" y="${r.y}" width="${r.b}" height="${r.h}" fill="#E4E0D9"/>`;
  for(let i=1;i<=5;i++){
   let fx,fy,fb,fh;
   if(r.dir==='v'){fh=r.h/5;fb=r.b;fx=r.x;fy=r.y+(i-1)*fh;}
   else{fb=r.b/5;fh=r.h;fx=r.x+(i-1)*fb;fy=r.y;}
   const akt=(rg===regal&&i===nr);
   s+=`<rect x="${fx}" y="${fy}" width="${fb}" height="${fh}" fill="${akt?'#F7E5E2':'none'}" stroke="#fff" stroke-width="3"/>`;
   const lx=fx+fb/2,ly=fy+fh/2;
   if(akt)dot={x:lx,y:ly};
   else s+=`<text x="${lx}" y="${ly+4}" text-anchor="middle" font-size="11" fill="#77747C">${rg}-0${i}</text>`;
  }
 }
 s+='<text x="30" y="474" text-anchor="middle" font-size="12" font-weight="700" fill="#17161A">Regal A</text>';
 s+='<text x="270" y="474" text-anchor="middle" font-size="12" font-weight="700" fill="#17161A">Regal B</text>';
 s+='<text x="150" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#17161A">Regal C</text>';
 if(dot){
  s+=`<circle class="puls" cx="${dot.x}" cy="${dot.y}" r="14" fill="${dotFarbe}"/>`;
  s+=`<circle cx="${dot.x}" cy="${dot.y}" r="9" fill="${dotFarbe}" stroke="#fff" stroke-width="2.5"/>`;
 }
 return s+'</svg>';
}

}
function szChips(a,akt){
 return a.sizes.map(sz=>`<span class="szchip ${sz===akt?'akt':''}"><i style="background:${szf(sz)}"></i>${sz}</span>`).join('');

/* ---- Scannen ---- */
function rScan(){
 let res='';
 if(S.scanShown){
  /* nach dem Einbuchen den GEBUCHTEN Artikel zeigen, nicht schon den naechsten */
  const sc=SCAN[(S.scanDone?S.scanCount+2:S.scanCount)%3];const a=getA(sc.art);
  const code=a.pl[sc.loc];
  if(S.scanDone){
   res=`<div class="c"><div class="ok">&#x2713; Eingebucht: 1x ${a.name} ${sc.size} -> ${code} · ${plText(code)}</div></div>`;
  }else{
   res=`<div class="c"><h2>${a.name} · <span class="szd" style="background:${szf(sc.size)}"></span>${sc.size}</h2><div class="ct">Lagerplatz-Vorschlag: <b>${code}</b> · ${plText(code)}</div>
    <button class="b full" id="ebtn" style="margin-top:10px" onclick="einbuchen()">Einbuchen</button></div>`;
  }
  res+=`<div class="c"><h2>Wo liegt das?</h2>
   <div class="ct"><b>${code}</b> · ${plText(code)} · Lager Embrach, 3 × 5 m, von oben</div>
   <div class="kartew">${lagerkarte(code,szf(sc.size))}</div>
   <div class="ct" style="margin-top:10px"><b>Im Schrank: Farbe = Grösse.</b></div>
   ${fachAnsicht(a,sc.size)}
   <div style="margin-top:8px">${szChips(a,sc.size)}</div></div>`;
 }
 let queue='';
 if(S.queue.length){
  const ql=S.queue.map(q=>{const a=getA(q.art);return `<div class="pzline">${q.n}x ${a.name} ${q.size} -> ${a.pl[q.loc]}</div>`;}).join('');
  queue=`<div class="qcard"><b>Warteschlange — wird nachgereicht</b> <span class="chip y">${S.queue.length}</span>${ql}</div>`;
 }
 $('v-scan').innerHTML=hd('Scannen','Wareneingang — Karton auf, Handy dran, fertig.')+`
  <div class="c"><div class="sw"><button class="tgl ${S.offline?'on':''}" role="switch" aria-checked="${S.offline}" onclick="toggleOffline()"><b></b></button> Test: Lager-WLAN ausgefallen</div></div>
  <button class="b scanbtn" id="sbtn" onclick="doScan()">Artikel scannen</button>
  ${res}${queue}
  <div class="ct mut" style="margin-top:14px">Jede Buchung landet genau einmal im System — auch wenn das WLAN zickt.</div>`;
}
function doScan(){
 const b=$('sbtn');b.classList.add('pulse');
 S.scanBusy=false;S.scanDone=false;S.scanShown=false;
 setTimeout(()=>{S.scanShown=true;renderAll();},500);
}
function einbuchen(){
 if(S.scanBusy){toast('Doppelt gedrückt — trotzdem genau 1x gebucht.');return;}
 S.scanBusy=true;
 const sc=SCAN[S.scanCount%3];const a=getA(sc.art);const i=si(a,sc.size);
 if(S.offline){
  S.queue.push({art:sc.art,size:sc.size,loc:sc.loc,n:1});
  try{localStorage.finQueue=JSON.stringify(S.queue);}catch(e){}
  S.scanDone=true;S.scanCount++;
  act(`Scan in Warteschlange (offline): 1x ${a.name} ${sc.size} -> ${a.pl[sc.loc]}`);
  toast('Offline — Buchung wartet in der Warteschlange.');
 }else{
  S.scanDone=true;S.scanCount++;S.eingebucht++;
  act(`Wareneingang gescannt: 1x ${a.name} ${sc.size} -> ${a.pl[sc.loc]} · ${plText(a.pl[sc.loc])}`,()=>{a.q[sc.loc][i]+=1;});
  toast('Eingebucht — Bestand und Übersicht sind aktualisiert.');
 }
}
function toggleOffline(){
 S.offline=!S.offline;
 if(!S.offline&&S.queue.length){
  const n=S.queue.length;
  S.queue.forEach(q=>{const a=getA(q.art);a.q[q.loc][si(a,q.size)]+=q.n;S.eingebucht+=q.n;});
  S.queue=[];try{localStorage.removeItem('finQueue');}catch(e){}
  act(`${n} Buchung(en) aus Warteschlange synchronisiert`);
  toast(`Synchronisiert — ${n} ${n===1?'Buchung':'Buchungen'} angekommen.`);
 }else renderAll();
}

/* ---- Frag Finelli ---- */
function rChat(){
 const chips=['Was ist knapp?','Was lief diese Woche?','Wo liegt Hoodie Classic M?','Was soll ich nachbestellen?'];
 const log=S.chatlog.map(m=>`<div class="bub ${m.r}">${esc(m.t)}</div>`).join('');
 $('v-chat').innerHTML=hd('Frag Finelli')+`
  <div class="c"><div class="ct">Antworten aus deinen Zahlen. Frag Finelli bucht nie — es antwortet nur.</div></div>
  <div class="bubw" id="bubw">${log}</div>
  <div class="chips">${chips.map(c=>`<button class="qchip" onclick="ask('${c}')">${c}</button>`).join('')}</div>
  <div class="cbar"><input class="inp" name="frage" id="frage" aria-label="Frage eingeben" placeholder="Frage eingeben…"><button class="b" onclick="sendFrage()">Senden</button></div>`;
 const f=$('frage');if(f)f.addEventListener('keydown',e=>{if(e.key==='Enter')sendFrage();});
 const bw=$('bubw');if(bw)bw.scrollTop=bw.scrollHeight;
}
function sendFrage(){const v=$('frage').value.trim();if(v)ask(v);}
function chatAnswer(q){
 q=q.toLowerCase();
 if(q.includes('knapp')||q.includes('wenig')||q.includes('leer')){
  const y=[],r=[];
  ART.forEach(a=>{const x=ampOf(a);if(x==='y'){const zi=a.q.zh.reduce((m,v,i)=>v<a.q.zh[m]?i:m,0);y.push(`${a.name} (${a.q.zh[zi]}x Zürich City)`);}else if(x==='r'){a.sizes.forEach((s,i)=>{if(a.q.zh[i]===0)r.push(`${a.name} ${s} (Zürich City 0)`);});}});
  return `Knapp: ${y.join(', ')}. Leer an einem Standort: ${r.join(', ')}.`;
 }
 if(q.includes('woche')||q.includes('lief'))return `Diese Woche: ${K.wochenSumme} Verkäufe über deinen Shopify-Shop. Stärkster Artikel: Tee Box-Logo. Details stehen im Wochen-Bericht.`;
 if(q.includes('hoodie')||(q.includes('wo')&&q.includes('liegt'))){const qz=liveMenge('a1','M','zh'),qe=liveMenge('a1','M','emb');return `Hoodie Classic M: Zürich City ${qz}x${qz===0?' (leer)':''}, Embrach ${qe}x — Lagerplatz EMB-B-03 · Regal B, Fach 3.`;}
 if(q.includes('nachbestell')||q.includes('bestellen'))return KI.text()+' Übernehmen kannst du das auf der Übersicht — entscheiden tust DU.';
 return 'Das kann die Vorschau noch nicht — die echte App lernt deine Fragen.';
}
function ask(q){
 S.chatlog.push({r:'u',t:q});const f=$('frage');if(f)f.value='';renderAll();
 setTimeout(()=>{S.chatlog.push({r:'f',t:chatAnswer(q)});renderAll();},400);
}

/* ---- Wochen-Bericht ---- */
function rReport(){
 const reich=Math.max(1,Math.round(totalA(getA('a5'))/4));
 $('v-report').innerHTML=hd('Wochen-Bericht','Montag, in Laiensprache — kein Excel nötig.')+`
  <div class="c"><h2>Was diese Woche lief</h2><div class="ct">Dein Shop hat diese Woche ${K.wochenSumme} Stück verkauft. Am besten lief Tee Box-Logo. Hoodie Classic M ist in Zürich City ausgegangen — in Embrach liegt Nachschub.</div></div>
  <div class="c" style="text-align:center"><h2>Eine Zahl der Woche</h2><div class="zw serif">${K.wochenSumme}</div><div class="ct mut" style="margin-top:6px">verkaufte Stücke über Shopify — Beispieldaten</div></div>
  <div class="c"><h2>Was als Nächstes kommt</h2><div class="ct">&bull; Vorschlag: Hoodie Classic M nachbestellen (siehe Übersicht — du entscheidest).</div><div class="ct">&bull; Beanie Logo im Auge behalten: reicht noch ~${reich} Wochen (Schätzung).</div></div>
  <div class="ct mut">Dieser Bericht kommt jeden Montag automatisch per Mail — ohne dass du etwas tun musst.</div>`;
}
/* ---- Locked ---- */
function rLocked(){
 $('v-locked').innerHTML=hd('Auswertungen')+`<div class="c lockw">${IC.lock}<h2 style="font-size:18px">Kommt später — mit Absicht.</h2>
  <div class="ct" style="max-width:420px;margin:8px auto">Ehrlich: Auswertungen bauen wir erst, wenn die Kasse automatisch bucht. Sonst rechnen wir auf falschen Zahlen.</div>
  <div class="mut" style="margin:8px 0 14px">Geplante Ausbau-Etappe — kein Druck, kein Aufpreis-Verkauf an diesem Termin.</div>
  <button class="b" onclick="go('home')">Zurück zur Übersicht</button></div>`;
}

/* ===== Init ===== */
buildPad();buildNav();
try{if(localStorage.finQueue){S.queue=JSON.parse(localStorage.finQueue);S.offline=S.queue.length>0;}}catch(e){}
if(sessionStorage.finPin==='1')go('home');else go('login');
setDate();
/* Datumswechsel-Timer */
let _day=new Date().toDateString();
setInterval(()=>{const d=new Date().toDateString();if(d!==_day)location.reload();else setDate();},60000);
</script>
