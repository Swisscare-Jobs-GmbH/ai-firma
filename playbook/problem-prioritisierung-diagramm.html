<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Problem-Prioritisierung nach ROI</title>
<style>
  :root { --fg:#1a1a1a; --muted:#666; --bg:#ffffff; }
  @media (prefers-color-scheme: dark) { :root { --fg:#e8e8e8; --muted:#a6a6a6; --bg:#161616; } }
  html,body { margin:0; background:var(--bg); font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; }
  .wrap { max-width:780px; margin:24px auto; padding:0 16px; }
  h1 { font-size:18px; font-weight:600; color:var(--fg); margin:0 0 4px; }
  p.sub { font-size:13px; color:var(--muted); margin:0 0 16px; }
  svg { width:100%; height:auto; }
  svg text { font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; }
  .th { font-size:14px; font-weight:600; }
  .ts { font-size:12px; }
  .arr { stroke:#888; stroke-width:1.5; fill:none; }
  .c-teal   rect { fill:#d6f3ef; stroke:#0E9B94; }
  .c-teal   text { fill:#0b3b38; }
  .c-purple rect { fill:#e7e5fb; stroke:#7F77DD; }
  .c-purple text { fill:#2e2a5e; }
  .c-green  rect { fill:#ddf1de; stroke:#3d9a4e; }
  .c-green  text { fill:#1d4a24; }
  .c-coral  rect { fill:#fbe4dd; stroke:#e06a4e; }
  .c-coral  text { fill:#6b2415; }
  @media (prefers-color-scheme: dark) {
    .c-teal   rect { fill:#0e3b38; stroke:#3fb4ab; } .c-teal   text { fill:#bff0e9; }
    .c-purple rect { fill:#2a2660; stroke:#a49cf0; } .c-purple text { fill:#dad6f7; }
    .c-green  rect { fill:#173a1c; stroke:#5cb96c; } .c-green  text { fill:#c9ecce; }
    .c-coral  rect { fill:#4a2018; stroke:#f08a6e; } .c-coral  text { fill:#f6ccc0; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Problem-Prioritisierung — welche Kunden-Probleme zuerst</h1>
  <p class="sub">Trefferpunkt-Zahl = Effekt × Chance ÷ Aufwand · dann force-rank, Oberstes zuerst.</p>
  <svg viewBox="0 0 700 360" role="img" xmlns="http://www.w3.org/2000/svg">
    <title>Problem-Prioritisierung nach ROI</title>
    <desc>Kunden-Problem wird nach Effekt, Aufwand und Chance bewertet, ergibt eine Trefferpunkt-Zahl, dann force-rank und das Oberste zuerst loesen. Im Zweifel zuerst das, was den Kunden am ehesten kuendigen laesst.</desc>
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <g class="c-teal">
      <rect x="20" y="70" width="190" height="76" rx="8" stroke-width="0.5"/>
      <text class="th" x="115" y="102" text-anchor="middle">Kunden-Problem</text>
      <text class="ts" x="115" y="122" text-anchor="middle">aus dem Feedback</text>
    </g>
    <line x1="210" y1="108" x2="253" y2="108" class="arr" marker-end="url(#arrow)"/>

    <g class="c-purple">
      <rect x="255" y="70" width="190" height="76" rx="8" stroke-width="0.5"/>
      <text class="th" x="350" y="102" text-anchor="middle">Bewerten</text>
      <text class="ts" x="350" y="122" text-anchor="middle">Effekt × Chance ÷ Aufwand</text>
    </g>
    <line x1="445" y1="108" x2="488" y2="108" class="arr" marker-end="url(#arrow)"/>

    <g class="c-green">
      <rect x="490" y="70" width="190" height="76" rx="8" stroke-width="0.5"/>
      <text class="th" x="585" y="102" text-anchor="middle">Force-Rank</text>
      <text class="ts" x="585" y="122" text-anchor="middle">Oberstes zuerst lösen</text>
    </g>

    <line x1="350" y1="146" x2="350" y2="236" class="arr" marker-end="url(#arrow)"/>

    <g class="c-coral">
      <rect x="70" y="238" width="560" height="76" rx="8" stroke-width="0.5"/>
      <text class="th" x="350" y="270" text-anchor="middle">Im Zweifel zuerst:</text>
      <text class="ts" x="350" y="290" text-anchor="middle">was den Kunden am ehesten kündigen lässt</text>
    </g>
  </svg>
</div>
</body>
</html>
